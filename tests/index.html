<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNR - Tests de Non-Régression - Cyrias Buddy</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { padding: 20px; }
    .tnr-header {
      background: linear-gradient(135deg, #1B3B5C 0%, #5EB091 100%);
      color: white;
      padding: 24px;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
    }
    .tnr-header h1 {
      font-size: 28px;
      margin-bottom: 4px;
    }
    .tnr-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .tnr-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .tnr-stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .tnr-stat-label {
      font-size: 11px;
      text-transform: uppercase;
      color: var(--ink-muted);
      font-weight: 600;
    }
    .tnr-progress-bar {
      width: 100%;
      height: 6px;
      background: var(--bg-subtle);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .tnr-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), #4A9076);
      transition: width 0.3s;
      width: 0;
    }
    .tnr-suite {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .tnr-suite-header {
      padding: 12px 16px;
      background: var(--bg-subtle);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .tnr-suite-header:hover { background: var(--surface-hover); }
    .tnr-suite-title { font-weight: 600; }
    .tnr-suite-tests {
      padding: 0 16px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s, padding 0.3s;
    }
    .tnr-suite.open .tnr-suite-tests {
      max-height: 2000px;
      padding: 12px 16px;
    }
    .tnr-test {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .tnr-test.pass { background: var(--ok-soft); color: var(--ok-fg); }
    .tnr-test.fail { background: var(--danger-soft); color: var(--danger-fg); }
    .tnr-test.skip { background: var(--bg-subtle); color: var(--ink-muted); }
    .tnr-test-name { font-size: 13px; flex: 1; }
    .tnr-test-time { font-size: 11px; opacity: 0.7; }
    .tnr-error {
      font-family: var(--font-mono);
      font-size: 11px;
      background: rgba(239, 68, 68, 0.1);
      padding: 6px 8px;
      border-radius: 4px;
      margin-top: 4px;
      white-space: pre-wrap;
    }
    .tnr-icon {
      font-size: 14px;
      width: 18px;
      text-align: center;
    }
    .tnr-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .tnr-log {
      background: var(--bg-subtle);
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--font-mono);
      font-size: 11px;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 16px;
    }
    .tnr-log-entry { padding: 2px 0; }
    .pass-color { color: var(--ok-fg); }
    .fail-color { color: var(--danger-fg); }
  </style>
</head>
<body>

<div class="tnr-header">
  <h1>🧪 Tests de Non-Régression</h1>
  <p style="opacity:0.9;">Cyrias Buddy - Suite automatique de validation</p>
</div>

<div class="tnr-controls">
  <button class="btn btn-primary" id="btn-run-all">▶️ Lancer tous les tests</button>
  <button class="btn btn-outline" id="btn-stop" disabled>⏸ Arrêter</button>
  <button class="btn btn-outline" id="btn-reset">🔄 Réinitialiser</button>
  <button class="btn btn-outline" id="btn-checklist">📋 Voir checklist manuelle</button>
  <button class="btn btn-outline" id="btn-back">← Retour au portail</button>
  <button class="btn btn-outline" id="btn-export-report">📥 Exporter rapport</button>
</div>

<div class="tnr-stats">
  <div class="tnr-stat">
    <div class="tnr-stat-value" id="stat-total">0</div>
    <div class="tnr-stat-label">Tests total</div>
  </div>
  <div class="tnr-stat">
    <div class="tnr-stat-value pass-color" id="stat-passed">0</div>
    <div class="tnr-stat-label">Réussis</div>
  </div>
  <div class="tnr-stat">
    <div class="tnr-stat-value fail-color" id="stat-failed">0</div>
    <div class="tnr-stat-label">Échoués</div>
  </div>
  <div class="tnr-stat">
    <div class="tnr-stat-value" id="stat-duration">—</div>
    <div class="tnr-stat-label">Durée</div>
  </div>
</div>

<div class="tnr-progress-bar">
  <div class="tnr-progress-fill" id="progress"></div>
</div>

<div id="tnr-results"></div>

<div class="card mt-4">
  <h3 class="card-title mb-2">📋 Console de log</h3>
  <div class="tnr-log" id="tnr-log">
    <div class="tnr-log-entry">📌 Cliquez sur "Lancer tous les tests" pour démarrer.</div>
  </div>
</div>

<!-- Dépendances : tout le portail doit être chargé -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Core -->
<script src="../assets/js/storage.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/router.js"></script>

<!-- Modules -->
<script src="../modules/dashboard.js"></script>
<script src="../modules/links.js"></script>
<script src="../modules/organisator.js"></script>
<script src="../modules/journal.js"></script>
<script src="../modules/notifcenter.js"></script>
<script src="../modules/communicator.js"></script>
<script src="../modules/direction.js"></script>
<script src="../modules/craminator.js"></script>
<script src="../modules/facturator.js"></script>
<script src="../modules/agregator.js"></script>
<script src="../modules/kanban.js"></script>
<script src="../modules/snippets.js"></script>
<script src="../modules/sql.js"></script>
<script src="../modules/loganalyzer.js"></script>
<script src="../modules/xmlviewer.js"></script>
<script src="../modules/bible.js"></script>
<script src="../modules/analytics.js"></script>
<script src="../modules/errortracker.js"></script>
<script src="../modules/gitcicd.js"></script>
<script src="../modules/config.js"></script>

<!-- Framework de test -->
<script src="tnr-framework.js"></script>

<!-- App init (pour register les routes) -->
<script>
  // Simuler App pour register les routes sans démarrer le router
  window.App = {
    config: { theme: 'light' },
    setTheme(t) { 
      this.config.theme = t;
      document.documentElement.setAttribute('data-theme', t);
    }
  };
</script>
<script src="../assets/js/app.js"></script>

<!-- Tests -->
<script src="tests-core.js"></script>
<script src="tests-modules.js"></script>

<script>
  // ===== TNR RUNNER UI =====
  const logEl = document.getElementById('tnr-log');
  const resultsEl = document.getElementById('tnr-results');
  let lastReport = null;
  let aborted = false;

  function log(msg, type = '') {
    const entry = document.createElement('div');
    entry.className = 'tnr-log-entry' + (type ? ' ' + type + '-color' : '');
    entry.textContent = msg;
    logEl.appendChild(entry);
    logEl.scrollTop = logEl.scrollHeight;
  }

  function renderResults(report) {
    resultsEl.innerHTML = report.suites.map((suite, idx) => `
      <div class="tnr-suite ${suite.failed > 0 ? 'open' : ''}" data-idx="${idx}">
        <div class="tnr-suite-header" onclick="this.parentElement.classList.toggle('open')">
          <div>
            <span class="tnr-icon">${suite.failed === 0 ? '✅' : '❌'}</span>
            <span class="tnr-suite-title">${escapeHtml(suite.name)}</span>
          </div>
          <div style="display:flex;gap:8px;align-items:center;">
            <span class="badge badge-ok">${suite.passed}</span>
            ${suite.failed > 0 ? `<span class="badge badge-danger">${suite.failed}</span>` : ''}
            <span class="text-xs text-muted">${suite.passed + suite.failed} tests</span>
          </div>
        </div>
        <div class="tnr-suite-tests">
          ${suite.tests.map(test => `
            <div class="tnr-test ${test.status}">
              <span class="tnr-icon">${test.status === 'pass' ? '✓' : '✗'}</span>
              <div style="flex:1;">
                <div class="tnr-test-name">${escapeHtml(test.name)}</div>
                ${test.error ? `<div class="tnr-error">${escapeHtml(test.error)}</div>` : ''}
              </div>
              <span class="tnr-test-time">${test.duration}ms</span>
            </div>
          `).join('')}
        </div>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }

  async function runAll() {
    document.getElementById('btn-run-all').disabled = true;
    document.getElementById('btn-stop').disabled = false;
    aborted = false;
    
    log('🚀 Démarrage de la TNR...');
    log(`📊 ${TNR.suites.length} suites, ${TNR.suites.reduce((s,sui)=>s+sui.tests.length,0)} tests à exécuter`);
    
    // Reset stats
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-passed').textContent = '0';
    document.getElementById('stat-failed').textContent = '0';
    document.getElementById('stat-duration').textContent = '—';
    document.getElementById('progress').style.width = '0';
    resultsEl.innerHTML = '';

    const totalTests = TNR.suites.reduce((s, sui) => s + sui.tests.length, 0);

    try {
      const report = await TNR.run((test, suite, stats) => {
        if (aborted) throw new Error('Aborted');
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-passed').textContent = stats.passed;
        document.getElementById('stat-failed').textContent = stats.failed;
        document.getElementById('progress').style.width = `${(stats.total / totalTests) * 100}%`;
        
        const icon = test.status === 'pass' ? '✓' : '✗';
        const color = test.status === 'pass' ? 'pass' : 'fail';
        log(`${icon} [${suite.name}] ${test.name}${test.error ? ' — ' + test.error : ''}`, color);
      });
      
      lastReport = report;
      renderResults(report);
      
      const durSec = (report.duration / 1000).toFixed(2);
      document.getElementById('stat-duration').textContent = durSec + 's';
      
      log('');
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      log(`🎯 RÉSULTAT FINAL`);
      log(`✅ Réussis: ${report.passed}/${report.total}`);
      log(`❌ Échoués: ${report.failed}/${report.total}`, report.failed > 0 ? 'fail' : '');
      log(`⏱  Durée: ${durSec}s`);
      log(`${report.success ? '✨ TOUS LES TESTS PASSENT' : '⚠️ DES TESTS ONT ÉCHOUÉ'}`, report.success ? 'pass' : 'fail');
    } catch (e) {
      log('❌ Erreur fatale: ' + e.message, 'fail');
    } finally {
      document.getElementById('btn-run-all').disabled = false;
      document.getElementById('btn-stop').disabled = true;
    }
  }

  function reset() {
    resultsEl.innerHTML = '';
    document.getElementById('stat-total').textContent = '0';
    document.getElementById('stat-passed').textContent = '0';
    document.getElementById('stat-failed').textContent = '0';
    document.getElementById('stat-duration').textContent = '—';
    document.getElementById('progress').style.width = '0';
    logEl.innerHTML = '<div class="tnr-log-entry">📌 Cliquez sur "Lancer tous les tests" pour démarrer.</div>';
    lastReport = null;
  }

  function exportReport() {
    if (!lastReport) {
      Toast.warn('Lancez d\'abord les tests');
      return;
    }
    const report = {
      timestamp: new Date().toISOString(),
      summary: {
        total: lastReport.total,
        passed: lastReport.passed,
        failed: lastReport.failed,
        success: lastReport.success,
        duration: lastReport.duration
      },
      suites: lastReport.suites
    };
    const blob = new Blob([JSON.stringify(report, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `tnr_report_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    Toast.success('Rapport exporté');
  }

  document.getElementById('btn-run-all').addEventListener('click', runAll);
  document.getElementById('btn-stop').addEventListener('click', () => { aborted = true; });
  document.getElementById('btn-reset').addEventListener('click', reset);
  document.getElementById('btn-export-report').addEventListener('click', exportReport);
  document.getElementById('btn-back').addEventListener('click', () => location.href = '../index.html');
  document.getElementById('btn-checklist').addEventListener('click', () => location.href = 'checklist.html');

  // Démarrer automatiquement
  window.addEventListener('load', () => {
    log(`📦 ${TNR.suites.length} suites de tests chargées`);
    const totalTests = TNR.suites.reduce((s, sui) => s + sui.tests.length, 0);
    log(`🧪 ${totalTests} tests prêts à être exécutés`);
    log('💡 Astuce: cliquez sur les suites pour voir le détail');
  });
</script>

</body>
</html>
