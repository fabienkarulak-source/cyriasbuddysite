<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    body { padding: 20px; max-width: 1100px; margin: 0 auto; }
    .checklist-header {
      background: linear-gradient(135deg, #5EB091 0%, #1B3B5C 100%);
      color: white;
      padding: 24px;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
    }
    .checklist-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }
    .checklist-section-header {
      padding: 14px 18px;
      background: var(--bg-subtle);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      border-bottom: 1px solid var(--border);
    }
    .checklist-section-header:hover { background: var(--surface-hover); }
    .checklist-section-title {
      font-weight: 600;
      font-size: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .checklist-progress {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--surface);
      border-radius: var(--radius-pill);
      font-weight: 600;
    }
    .checklist-section.complete .checklist-progress {
      background: var(--ok-soft);
      color: var(--ok-fg);
    }
    .checklist-items {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s;
    }
    .checklist-section.open .checklist-items {
      max-height: 3000px;
      padding: 8px 0;
    }
    .checklist-item {
      padding: 10px 18px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      border-bottom: 1px solid var(--divider);
      cursor: pointer;
      transition: background 0.15s;
    }
    .checklist-item:hover { background: var(--bg-subtle); }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-item.checked {
      background: rgba(34, 197, 94, 0.05);
    }
    .checklist-item.failed {
      background: rgba(239, 68, 68, 0.05);
    }
    .checklist-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border-strong);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: var(--surface);
    }
    .checklist-item.checked .checklist-checkbox {
      background: var(--ok);
      border-color: var(--ok);
      color: white;
    }
    .checklist-item.failed .checklist-checkbox {
      background: var(--danger);
      border-color: var(--danger);
      color: white;
    }
    .checklist-content { flex: 1; }
    .checklist-title { font-size: 13px; font-weight: 500; }
    .checklist-item.checked .checklist-title { text-decoration: line-through; opacity: 0.7; }
    .checklist-desc { font-size: 11px; color: var(--ink-muted); margin-top: 2px; }
    .checklist-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .checklist-item:hover .checklist-actions { opacity: 1; }
    .checklist-mini-btn {
      width: 24px;
      height: 24px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: 12px;
    }
    .checklist-mini-btn:hover { background: var(--bg-subtle); }
    .checklist-summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      text-align: center;
    }
    .summary-value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .summary-label { font-size: 11px; text-transform: uppercase; color: var(--ink-muted); }
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .global-progress {
      height: 8px;
      background: var(--bg-subtle);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 24px;
    }
    .global-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--brand), #4A9076);
      transition: width 0.3s;
    }
  </style>
</head>

// ===== STATE =====
const STORAGE_KEY = 'cyrias_tnr_checklist';
let state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getItemStatus(itemId) {
  return state[itemId] || 'pending'; // pending | passed | failed
}

function setItemStatus(itemId, status) {
  if (status === 'pending') delete state[itemId];
  else state[itemId] = status;
  saveState();
  renderAll();
}

// ===== RENDER =====
function renderAll() {
  const container = document.getElementById('checklist-container');
  container.innerHTML = CHECKLIST.map(section => {
    const sectionItems = section.items;
    const passed = sectionItems.filter(i => getItemStatus(i.id) === 'passed').length;
    const failed = sectionItems.filter(i => getItemStatus(i.id) === 'failed').length;
    const total = sectionItems.length;
    const isComplete = passed === total;
    
    return `
      <div class="checklist-section ${isComplete ? 'complete' : ''}" data-section="${section.id}">
        <div class="checklist-section-header" onclick="toggleSection('${section.id}')">
          <div class="checklist-section-title">
            ${section.title}
          </div>
          <div class="checklist-progress">
            ${passed}/${total} ${failed > 0 ? `(${failed} ❌)` : ''}
          </div>
        </div>
        <div class="checklist-items">
          ${sectionItems.map(item => {
            const status = getItemStatus(item.id);
            return `
              <div class="checklist-item ${status === 'passed' ? 'checked' : ''} ${status === 'failed' ? 'failed' : ''}" 
                   onclick="cycleStatus('${item.id}')">
                <div class="checklist-checkbox">${status === 'passed' ? '✓' : status === 'failed' ? '✗' : ''}</div>
                <div class="checklist-content">
                  <div class="checklist-title">${escapeHtml(item.title)}</div>
                  ${item.desc ? `<div class="checklist-desc">${escapeHtml(item.desc)}</div>` : ''}
                </div>
                <div class="checklist-actions" onclick="event.stopPropagation()">
                  <button class="checklist-mini-btn" onclick="setItemStatus('${item.id}', 'passed')" title="OK">✓</button>
                  <button class="checklist-mini-btn" onclick="setItemStatus('${item.id}', 'failed')" title="KO">✗</button>
                  <button class="checklist-mini-btn" onclick="setItemStatus('${item.id}', 'pending')" title="Reset">↻</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');
  
  updateStats();
}

function toggleSection(id) {
  document.querySelector(`[data-section="${id}"]`)?.classList.toggle('open');
}

function cycleStatus(itemId) {
  const current = getItemStatus(itemId);
  const next = current === 'pending' ? 'passed' : current === 'passed' ? 'failed' : 'pending';
  setItemStatus(itemId, next);
}

function updateStats() {
  let total = 0, passed = 0, failed = 0;
  CHECKLIST.forEach(s => {
    s.items.forEach(i => {
      total++;
      const status = getItemStatus(i.id);
      if (status === 'passed') passed++;
      else if (status === 'failed') failed++;
    });
  });
  const pending = total - passed - failed;
  
  document.getElementById('sum-total').textContent = total;
  document.getElementById('sum-passed').textContent = passed;
  document.getElementById('sum-failed').textContent = failed;
  document.getElementById('sum-pending').textContent = pending;
  
  const pct = total > 0 ? ((passed + failed) / total) * 100 : 0;
  document.getElementById('global-progress').style.width = pct + '%';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = String(str);
  return div.innerHTML;
}

// ===== EXPORT REPORT =====
function exportReport() {
  let total = 0, passed = 0, failed = 0;
  const sections = CHECKLIST.map(s => ({
    section: s.title,
    items: s.items.map(i => {
      total++;
      const status = getItemStatus(i.id);
      if (status === 'passed') passed++;
      else if (status === 'failed') failed++;
      return { title: i.title, status };
    })
  }));
  
  const report = {
    timestamp: new Date().toISOString(),
    summary: { total, passed, failed, pending: total - passed - failed },
    sections
  };
  
  // HTML
  let html = `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Rapport TNR</title>
<style>
body{font-family:Inter,sans-serif;max-width:900px;margin:20px auto;padding:20px;color:#0F172A;}
h1{color:#1B3B5C;}
h2{color:#5EB091;border-bottom:2px solid #5EB091;padding-bottom:6px;margin-top:24px;}
.summary{background:#F8FAFB;padding:16px;border-radius:8px;margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.summary div{text-align:center;}
.summary strong{display:block;font-size:24px;}
.passed{color:#16A34A;} .failed{color:#DC2626;} .pending{color:#D97706;}
.item{padding:8px;border-bottom:1px solid #ECEFF2;display:flex;gap:10px;}
.item.passed{background:#DCFCE7;} .item.failed{background:#FEE2E2;} .item.pending{background:#FEF3C7;}
.status{font-weight:600;width:80px;}
</style></head><body>
<h1>📋 Rapport TNR - Cyrias Buddy</h1>
<p>Généré le ${new Date(report.timestamp).toLocaleString('fr-FR')}</p>
<div class="summary">
  <div><strong>${total}</strong>Total</div>
  <div class="passed"><strong>${passed}</strong>Validés</div>
  <div class="failed"><strong>${failed}</strong>Échoués</div>
  <div class="pending"><strong>${total - passed - failed}</strong>En attente</div>
</div>`;
  
  sections.forEach(s => {
    html += `<h2>${s.section}</h2>`;
    s.items.forEach(i => {
      const icon = i.status === 'passed' ? '✅' : i.status === 'failed' ? '❌' : '⏸';
      html += `<div class="item ${i.status}"><span class="status">${icon}</span><span>${i.title}</span></div>`;
    });
  });
  
  html += '</body></html>';
  
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `tnr_manual_${new Date().toISOString().split('T')[0]}.html`;
  a.click();
  URL.revokeObjectURL(url);
}

// ===== EVENTS =====
document.getElementById('btn-expand-all').addEventListener('click', () => {
  document.querySelectorAll('.checklist-section').forEach(s => s.classList.add('open'));
});
document.getElementById('btn-collapse-all').addEventListener('click', () => {
  document.querySelectorAll('.checklist-section').forEach(s => s.classList.remove('open'));
});
document.getElementById('btn-reset').addEventListener('click', () => {
  if (confirm('Réinitialiser tous les statuts ?')) {
    state = {};
    saveState();
    renderAll();
  }
});
document.getElementById('btn-auto').addEventListener('click', () => location.href = 'index.html');
document.getElementById('btn-back').addEventListener('click', () => location.href = '../index.html');
document.getElementById('btn-export').addEventListener('click', exportReport);

// Init
renderAll();
</script>
