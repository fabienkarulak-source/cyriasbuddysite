<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyrias Buddy — Portail & Outils</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/main.css"> <script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { corePlugins: { preflight: false } }</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.default.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@9.1.1/dist/index.iife.js"></script>
</head>
<body>
<script>
// Prévention du flash blanc
(function(){try{var s=localStorage.getItem('cyrias_theme');var t=s||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-header">
      <div class="brand">
        <div class="brand-logo">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="9 12 12 15 17 10"/>
          </svg>
        </div>
        <div class="brand-name">CYR<span>IAS</span> Bud<span>dy</span></div>
      </div>
      <button class="sidebar-collapse-btn" onclick="App.toggleSidebar()" title="Réduire / déplier (Ctrl+B)">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
      </button>
      <button class="theme-toggle" onclick="App.toggleTheme()" title="Basculer thème clair / sombre"><span id="theme-icon"></span></button>
    </div>
    
    <div class="sidebar-nav">
      <button class="nav-search-btn" onclick="openGlobalSearch()">
        <span class="nav-search-label"><span class="nav-search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span> Recherche rapide</span>
        <kbd>Ctrl+K</kbd>
      </button>

      <div class="nav-section" data-section="quotidien">
        <button class="nav-section-header" onclick="App.toggleNavSection('quotidien')">
          <span class="nav-section-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          <span class="nav-section-label">Espace quotidien</span>
        </button>
        <div class="nav-section-body">
          <button class="nav-item active" onclick="App.navigateTo('dashboard')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Accueil</button>
          <button class="nav-item" onclick="App.navigateTo('organisator')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></span> Organisator</button>
          <button class="nav-item" onclick="App.navigateTo('communicator')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></span> Communicator</button>
        </div>
      </div>

      <div class="nav-section" data-section="pilotage">
        <button class="nav-section-header" onclick="App.toggleNavSection('pilotage')">
          <span class="nav-section-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>
          <span class="nav-section-label">Pilotage</span>
        </button>
        <div class="nav-section-body">
          <button class="nav-item" onclick="App.navigateTo('craminator')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 12v5"/><path d="M11 8v9"/><path d="M15 14v3"/><path d="M19 10v7"/></svg></span> CRAminator</button>
          <button class="nav-item" onclick="App.navigateTo('kanban')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 3a2 2 0 0 0-2 2"/><path d="M19 3a2 2 0 0 1 2 2"/><path d="M21 19a2 2 0 0 1-2 2"/><path d="M5 21a2 2 0 0 1-2-2"/><path d="M9 3h1"/><path d="M9 21h1"/><path d="M14 3h1"/><path d="M14 21h1"/><path d="M3 9v1"/><path d="M21 9v1"/><path d="M3 14v1"/><path d="M21 14v1"/><line x1="7" x2="7" y1="8" y2="13"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="17" x2="17" y1="8" y2="11"/></svg></span> Kanban & MEP</button>
        </div>
      </div>
    </div>
    <div class="nav-footer">
      <button class="nav-item" onclick="App.navigateTo('config')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span> Configuration</button>
    </div>
  </nav>

  <div class="main-content">
    
    <div class="page active" id="page-dashboard">
      <div class="hero-section">
        <div id="home-welcome-banner" style="padding: 28px 40px 12px 40px;">
          <h1 style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;color:var(--primary);margin:0;letter-spacing:-0.5px;">
            <span id="home-greeting">Bonjour</span> <span id="home-username" style="color:var(--secondary-dark);">Compagnon</span>
          </h1>
        </div>
        <h3 class="section-title">Vos indicateurs :</h3>
        <div class="content-grid" id="home-grid">
           <div class="card p-4">Vos indicateurs apparaîtront ici.</div>
        </div>
      </div>
    </div>

    <div class="page" id="page-craminator">
      <div class="page-header" style="padding-bottom: 20px; background: var(--surface); border-bottom: 1px solid var(--border);">
          <div>
              <h1 style="font-family: 'Fraunces', serif; font-size: 28px; font-weight: 800; color: var(--primary);">CRAminator</h1>
              <p style="color: var(--ink-muted); font-size: 14px; margin-top: 4px;">Outil de suivi TMA & Analyse des temps (CRA)</p>
          </div>
      </div>
      <div class="container mx-auto px-4 py-4">
            <div id="upload-section">
                <div id="drop-zone" class="drop-zone p-12 text-center max-w-3xl mx-auto" style="background: var(--bg-card);">
                    <h2 class="text-xl font-bold mb-2" style="color: var(--text-primary);">Importez vos fichiers Stafiz bruts</h2>
                    <div class="flex items-center justify-center gap-3 mb-6">
                        <label class="btn-gradient text-sm cursor-pointer flex items-center gap-2">
                            Parcourir mes fichiers
                            <input type="file" id="file-upload" class="hidden" accept=".xlsx,.xls,.csv" multiple onchange="CRAModule.handleFiles(event)" style="display:none;">
                        </label>
                    </div>
                </div>
            </div>

            <div id="dashboard-section" class="hidden">
                <div class="sticky top-[96px] z-40 py-3 mb-5" style="background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px);">
                    <div class="glass-card-light p-3 flex gap-2">
                        <button onclick="CRAModule.switchTab('dashboard')" id="btn-tab-dashboard" class="btn-gradient text-xs">Dashboard</button>
                        <button onclick="CRAModule.switchTab('explorer')" id="btn-tab-explorer" class="btn-ghost text-xs">Explorateur</button>
                        <button onclick="CRAModule.clearData()" class="btn-ghost text-xs" style="color: var(--danger); margin-left: auto;">Tout effacer</button>
                    </div>
                </div>
                <div id="dashboard-content">
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-4">
                        <div class="glass-card p-5"><h3 class="text-sm font-bold mb-3">Jours par Client</h3><div class="chart-container" style="height:250px;"><canvas id="clientChart"></canvas></div></div>
                        <div class="glass-card p-5"><h3 class="text-sm font-bold mb-3">Répartition par Tâche</h3><div class="chart-container" style="height:250px;"><canvas id="taskChart"></canvas></div></div>
                    </div>
                </div>
                <div id="explorer-content" class="hidden">
                    <div class="glass-card p-5 overflow-x-auto">
                        <table class="min-w-full text-left text-xs" style="width: 100%;">
                            <thead style="border-bottom: 1px solid var(--border);"><tr><th>Client</th><th>Collaborateur</th><th>Jours</th><th>Tâche</th></tr></thead>
                            <tbody id="explorer-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
      </div>
    </div>

    </div>
</div>

<script src="assets/js/storage.js"></script>
<script src="assets/js/app.js"></script>
<script src="modules/craminator.js"></script>
</body>
</html>
