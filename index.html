<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyrias Buddy — Portail Modulaire</title>
<style>

/* ============================================================
   v14 — DESIGN SYSTEM "Calm Productivity"
   ============================================================ */
:root {
  /* === Brand === */
  --brand: #5EB091;
  --brand-hover: #4A9076;
  --brand-active: #3D7660;
  --brand-soft: #E6F4EF;
  --brand-glow: rgba(94, 176, 145, 0.15);

  --primary: #1B3B5C;
  --primary-hover: #2A517A;
  --primary-active: #122740;
  --primary-soft: #EEF2F7;

  /* === Surfaces (fond) === */
  --bg: #F8FAFB;            /* Fond global, légèrement bleuté */
  --bg-subtle: #F1F4F6;     /* Hover sur fond global */
  --surface: #FFFFFF;       /* Cartes, modals */
  --surface-hover: #F8FAFB;
  --surface-elev: #FFFFFF;  /* Surfaces surélevées (popovers) */

  /* === Bordures === */
  --border: #E5E9EE;
  --border-strong: #CFD6DE;
  --border-subtle: #F0F3F6;
  --divider: #ECEFF2;

  /* === Texte === */
  --ink: #0F172A;            /* Titres, texte principal */
  --ink-secondary: #475569;  /* Texte secondaire */
  --ink-muted: #94A3B8;      /* Labels, hints */
  --ink-disabled: #CBD5E1;
  --ink-inverse: #FFFFFF;

  /* === Sémantique === */
  --ok: #22C55E;
  --ok-fg: #16A34A;
  --ok-soft: #DCFCE7;
  --ok-border: #BBF7D0;

  --warn: #F59E0B;
  --warn-fg: #D97706;
  --warn-soft: #FEF3C7;
  --warn-border: #FDE68A;

  --danger: #EF4444;
  --danger-fg: #DC2626;
  --danger-soft: #FEE2E2;
  --danger-border: #FECACA;

  --info: #3B82F6;
  --info-fg: #2563EB;
  --info-soft: #DBEAFE;
  --info-border: #BFDBFE;

  /* === Aliases compatibilité avec anciennes vars === */
  --primary-light: var(--primary-hover);
  --primary-dark: var(--primary-active);
  --secondary: var(--brand);
  --secondary-light: var(--brand-soft);
  --secondary-dark: var(--brand-hover);
  --danger-bg: var(--danger-soft);
  --warn-bg: var(--warn-soft);
  --info-bg: var(--info-soft);
  --ok-bg: var(--ok-soft);
  --border-light: var(--border-subtle);
  --surface-alt: var(--bg);

  /* === Élévations (ombres) === */
  --elev-1: 0 1px 2px rgba(15, 23, 42, 0.04);
  --elev-2: 0 2px 6px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.04);
  --elev-3: 0 8px 24px rgba(15, 23, 42, 0.08), 0 2px 4px rgba(15, 23, 42, 0.04);
  --elev-4: 0 20px 48px rgba(15, 23, 42, 0.12), 0 4px 8px rgba(15, 23, 42, 0.06);
  --elev-glow: 0 0 0 3px var(--brand-glow);
  /* Aliases */
  --shadow-sm: var(--elev-1);
  --shadow: var(--elev-2);
  --shadow-lg: var(--elev-4);

  /* === Espacements (grille 4px) === */
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
  --space-6: 32px;
  --space-7: 48px;
  --space-8: 64px;

  /* === Typographie === */
  --font-ui: 'Inter', 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', Consolas, monospace;

  --fs-xxs: 10px;
  --fs-xs: 11px;
  --fs-sm: 12px;
  --fs-base: 13px;
  --fs-md: 14px;
  --fs-lg: 16px;
  --fs-xl: 20px;
  --fs-2xl: 24px;
  --fs-3xl: 32px;

  --lh-tight: 1.2;
  --lh-normal: 1.5;
  --lh-relaxed: 1.7;

  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;
  --fw-extrabold: 800;

  /* === Radius === */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --radius-pill: 999px;

  /* === Transitions === */
  --t-fast: 0.12s cubic-bezier(0.4, 0, 0.2, 1);
  --t-base: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --t-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  --t-bounce: 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  --transition: var(--t-base);

  /* === Z-index === */
  --z-dropdown: 100;
  --z-sticky: 200;
  --z-overlay: 1000;
  --z-modal: 9998;
  --z-toast: 10000;
}

/* === DARK MODE === */
[data-theme="dark"] {
  --bg: #0B1220;
  --bg-subtle: #111827;
  --surface: #151E2E;
  --surface-hover: #1B2538;
  --surface-elev: #1B2538;

  --border: #243248;
  --border-strong: #334155;
  --border-subtle: #1F2A3D;
  --divider: #1F2A3D;

  --ink: #F1F5F9;
  --ink-secondary: #CBD5E1;
  --ink-muted: #64748B;
  --ink-disabled: #475569;
  --ink-inverse: #0F172A;

  --primary: #5EB091;        /* Le vert devient l'accent primaire en dark */
  --primary-hover: #6FC4A4;
  --primary-active: #7DD3AE;
  --primary-soft: rgba(94, 176, 145, 0.12);

  --brand: #5EB091;
  --brand-hover: #6FC4A4;
  --brand-soft: rgba(94, 176, 145, 0.12);
  --brand-glow: rgba(94, 176, 145, 0.25);

  --ok-soft: rgba(34, 197, 94, 0.12);
  --ok-border: rgba(34, 197, 94, 0.3);
  --warn-soft: rgba(245, 158, 11, 0.12);
  --warn-border: rgba(245, 158, 11, 0.3);
  --danger-soft: rgba(239, 68, 68, 0.12);
  --danger-border: rgba(239, 68, 68, 0.3);
  --info-soft: rgba(59, 130, 246, 0.12);
  --info-border: rgba(59, 130, 246, 0.3);

  /* Aliases */
  --secondary: var(--brand);
  --secondary-light: var(--brand-soft);
  --secondary-dark: var(--brand-hover);
  --primary-light: var(--primary-hover);
  --primary-dark: var(--primary-active);
  --danger-bg: var(--danger-soft);
  --warn-bg: var(--warn-soft);
  --info-bg: var(--info-soft);
  --ok-bg: var(--ok-soft);
  --border-light: var(--border-subtle);

  --elev-1: 0 1px 2px rgba(0, 0, 0, 0.3);
  --elev-2: 0 2px 8px rgba(0, 0, 0, 0.35), 0 1px 2px rgba(0, 0, 0, 0.3);
  --elev-3: 0 8px 24px rgba(0, 0, 0, 0.45), 0 2px 4px rgba(0, 0, 0, 0.3);
  --elev-4: 0 20px 48px rgba(0, 0, 0, 0.55), 0 4px 8px rgba(0, 0, 0, 0.3);

  color-scheme: dark;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body { 
  font-family: var(--font-ui); 
  font-size: var(--fs-base);
  background: var(--bg); 
  color: var(--ink); 
  min-height: 100vh; 
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';  /* Inter optimisations */
  transition: background-color var(--t-base), color var(--t-base);
}

::selection { background: var(--brand-glow); color: var(--ink); }

/* Scrollbar personnalisée */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-muted); }
[data-theme="dark"] ::-webkit-scrollbar-thumb { background: var(--border-strong); border-color: var(--bg); }

.app { display: flex; min-height: 100vh; }

/* SCRATCHPAD FLOTTANT */
.scratchpad-btn { position: fixed; bottom: 24px; right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--secondary); color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 12px rgba(94, 176, 145, 0.4); cursor: pointer; z-index: 1000; transition: transform 0.2s; border: none; }
.scratchpad-btn:hover { transform: scale(1.1); }
.scratchpad-panel { position: fixed; bottom: 90px; right: 24px; width: 350px; height: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1000; display: none; flex-direction: column; overflow: hidden; }
.scratchpad-panel.open { display: flex; animation: slideUp 0.2s ease-out; }
.scratchpad-header { padding: 12px 16px; background: var(--primary); color: white; font-weight: 700; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.scratchpad-area { flex: 1; padding: 16px; border: none; outline: none; resize: none; font-size: 13px; font-family: 'JetBrains Mono', monospace; background: var(--bg); color: var(--ink); line-height: 1.5; }
@keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

/* ===== Palette de recherche globale (Ctrl+K) ===== */
#global-search-panel { position: fixed; inset: 0; z-index: 9999; display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh; }
.gs-backdrop { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(2px); }
.gs-modal { position: relative; width: min(640px, 92vw); max-height: 70vh; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 20px 60px rgba(0,0,0,0.25); overflow: hidden; display: flex; flex-direction: column; animation: slideUp 0.18s ease-out; }
.gs-input-wrap { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.gs-input-wrap input { flex: 1; border: none; outline: none; font-size: 16px; font-family: 'Outfit', sans-serif; background: transparent; color: var(--ink); }
#gs-results { overflow-y: auto; max-height: calc(70vh - 70px); }
.gs-item { display: flex; align-items: center; gap: 12px; padding: 12px 20px; cursor: pointer; transition: background 0.1s; border-left: 3px solid transparent; }
.gs-item:hover, .gs-item.gs-active { background: var(--secondary-light); border-left-color: var(--secondary); }
.gs-icon { font-size: 20px; flex-shrink: 0; }
.gs-text { flex: 1; min-width: 0; }
.gs-label { font-weight: 600; font-size: 14px; color: var(--ink); }
.gs-sub { font-size: 11px; color: var(--ink-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.gs-kind { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--ink-muted); background: var(--bg); padding: 3px 8px; border-radius: 4px; flex-shrink: 0; }
.gs-empty { padding: 32px; text-align: center; color: var(--ink-muted); font-size: 13px; }
.gs-hint { position: fixed; bottom: 24px; left: 24px; font-size: 11px; color: var(--ink-muted); background: var(--surface); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; z-index: 100; pointer-events: none; box-shadow: var(--shadow); }
.gs-hint kbd { font-family: 'JetBrains Mono', monospace; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border); font-size: 10px; }

/* ===== Zone de danger ===== */
.btn-danger-zone {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 14px 16px;
  background: white;
  border: 1px solid var(--danger);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: all var(--transition);
  color: var(--danger);
}
.btn-danger-zone:hover {
  background: var(--danger-bg);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(229, 62, 62, 0.15);
}
.btn-danger-zone .bdz-title { font-weight: 700; font-size: 13px; }
.btn-danger-zone .bdz-sub { font-size: 11px; color: var(--ink-secondary); font-weight: 400; }
.btn-danger-zone-critical {
  background: var(--danger);
  color: white;
  border-color: var(--danger);
}
.btn-danger-zone-critical:hover {
  background: #c53030;
  border-color: #c53030;
}
.btn-danger-zone-critical .bdz-sub { color: rgba(255,255,255,0.85); }

/* Modal danger : double confirmation */
.danger-modal-backdrop {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(3px);
}
.danger-modal {
  background: var(--surface);
  width: min(520px, 92vw);
  border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(229, 62, 62, 0.3);
  overflow: hidden;
  border: 2px solid var(--danger);
  animation: slideUp 0.2s ease-out;
}
.danger-modal-header {
  background: var(--danger);
  color: white;
  padding: 16px 22px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.danger-modal-body {
  padding: 22px;
}
.danger-modal-body strong { color: var(--danger); }
.danger-confirm-input {
  width: 100%;
  padding: 10px 12px;
  border: 2px solid var(--danger);
  border-radius: var(--radius-sm);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  margin-top: 8px;
  outline: none;
}
.danger-confirm-input:focus {
  box-shadow: 0 0 0 3px rgba(229, 62, 62, 0.2);
}

/* ============================================================
   v18 — DEBUG PANEL
   ============================================================ */
.dbg-panel {
  position: fixed;
  top: 60px;
  right: 24px;
  width: 540px;
  height: 640px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  box-shadow: var(--elev-4);
  z-index: var(--z-toast);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  font-size: var(--fs-sm);
  font-family: var(--font-ui);
  resize: both;
  min-width: 360px;
  min-height: 280px;
}

.dbg-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px;
  background: linear-gradient(180deg, var(--bg-subtle), var(--surface));
  border-bottom: 1px solid var(--divider);
  cursor: grab;
  user-select: none;
}
.dbg-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: var(--fw-bold);
  font-size: var(--fs-base);
  color: var(--ink);
}
.dbg-title svg { color: var(--brand); }
.dbg-badge {
  font-size: 14px;
  line-height: 1;
  color: var(--ok);
  margin-left: 4px;
}
.dbg-actions {
  display: flex;
  gap: 4px;
}
.dbg-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 9px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink-secondary);
  border-radius: var(--radius-xs);
  font-size: 11px;
  font-weight: var(--fw-medium);
  font-family: inherit;
  cursor: pointer;
  transition: all var(--t-fast);
}
.dbg-btn:hover {
  background: var(--bg-subtle);
  border-color: var(--border-strong);
  color: var(--ink);
}
.dbg-btn-close {
  width: 26px;
  height: 26px;
  padding: 0;
  justify-content: center;
}
.dbg-btn-close:hover {
  background: var(--danger-soft);
  color: var(--danger-fg);
  border-color: var(--danger-border);
}

.dbg-tabs {
  display: flex;
  gap: 2px;
  padding: 6px 10px;
  background: var(--bg-subtle);
  border-bottom: 1px solid var(--divider);
  overflow-x: auto;
  scrollbar-width: thin;
}
.dbg-tab {
  background: none;
  border: none;
  padding: 5px 10px;
  border-radius: var(--radius-xs);
  font-size: 11px;
  font-weight: var(--fw-medium);
  font-family: inherit;
  color: var(--ink-secondary);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--t-fast);
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.dbg-tab:hover {
  background: var(--surface);
  color: var(--ink);
}
.dbg-tab-active {
  background: var(--surface);
  color: var(--brand-hover);
  font-weight: var(--fw-bold);
  box-shadow: var(--elev-1);
}
.dbg-tab-count {
  background: var(--ink-muted);
  color: var(--ink-inverse);
  font-size: 9px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: var(--fw-bold);
  font-family: var(--font-mono);
  min-width: 14px;
  text-align: center;
}
.dbg-tab-count:empty { display: none; }

.dbg-body {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  background: var(--surface);
}
.dbg-section {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.dbg-section-title {
  font-size: 12px;
  font-weight: var(--fw-bold);
  color: var(--ink);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}
.dbg-summary {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-left: 3px solid var(--brand);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: baseline;
  gap: 10px;
}
.dbg-summary-ok { border-left-color: var(--ok); background: var(--ok-soft); }
.dbg-summary-warn { border-left-color: var(--warn); background: var(--warn-soft); }
.dbg-summary-big {
  font-size: 24px;
  font-weight: var(--fw-extrabold);
  color: var(--ink);
  font-family: var(--font-mono);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.5px;
}
.dbg-summary-label {
  font-size: 12px;
  color: var(--ink-secondary);
  font-weight: var(--fw-medium);
}

.dbg-checks {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.dbg-check {
  display: grid;
  grid-template-columns: 16px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 6px 10px;
  border-radius: var(--radius-xs);
  font-size: 11.5px;
  background: var(--bg-subtle);
  border: 1px solid transparent;
}
.dbg-check-ok { color: var(--ink); border-color: var(--ok-border); background: var(--ok-soft); }
.dbg-check-err { color: var(--danger-fg); border-color: var(--danger-border); background: var(--danger-soft); font-weight: var(--fw-semibold); }
.dbg-check-icon {
  font-weight: var(--fw-extrabold);
  text-align: center;
}
.dbg-check-ok .dbg-check-icon { color: var(--ok-fg); }
.dbg-check-err .dbg-check-icon { color: var(--danger-fg); }
.dbg-check-detail {
  font-size: 10.5px;
  color: var(--ink-muted);
  font-family: var(--font-mono);
}
.dbg-check-err .dbg-check-detail { color: var(--danger-fg); }

.dbg-storage-list {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.dbg-storage-row {
  display: grid;
  grid-template-columns: 1fr 70px 26px 26px;
  gap: 6px;
  align-items: center;
  padding: 5px 10px;
  background: var(--bg-subtle);
  border-radius: var(--radius-xs);
  font-size: 11.5px;
}
.dbg-storage-row:hover { background: var(--surface-hover); }
.dbg-storage-key {
  font-family: var(--font-mono);
  color: var(--ink);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.dbg-storage-size {
  font-family: var(--font-mono);
  color: var(--ink-muted);
  text-align: right;
  font-size: 10.5px;
  font-variant-numeric: tabular-nums;
}
.dbg-mini-btn {
  width: 24px; height: 24px;
  padding: 0;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink-secondary);
  border-radius: var(--radius-xs);
  font-size: 11px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--t-fast);
}
.dbg-mini-btn:hover { background: var(--bg-subtle); border-color: var(--border-strong); color: var(--ink); }
.dbg-mini-btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }

.dbg-logs, .dbg-errors {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.dbg-log {
  display: grid;
  grid-template-columns: 70px 50px 1fr;
  gap: 8px;
  padding: 4px 8px;
  border-radius: var(--radius-xs);
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-subtle);
  border-left: 2px solid var(--ink-muted);
}
.dbg-log-time { color: var(--ink-muted); }
.dbg-log-level { font-weight: var(--fw-bold); }
.dbg-log-msg { color: var(--ink); white-space: pre-wrap; word-break: break-word; }
.dbg-log-log { border-left-color: var(--info); }
.dbg-log-log .dbg-log-level { color: var(--info-fg); }
.dbg-log-warn { border-left-color: var(--warn); background: var(--warn-soft); }
.dbg-log-warn .dbg-log-level { color: var(--warn-fg); }
.dbg-log-error { border-left-color: var(--danger); background: var(--danger-soft); }
.dbg-log-error .dbg-log-level { color: var(--danger-fg); }
.dbg-log-info { border-left-color: var(--ok); }
.dbg-log-info .dbg-log-level { color: var(--ok-fg); }

.dbg-error {
  background: var(--danger-soft);
  border: 1px solid var(--danger-border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
}
.dbg-error-head {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--danger-fg);
  font-weight: var(--fw-semibold);
  margin-bottom: 4px;
}
.dbg-error-source { font-family: var(--font-mono); }
.dbg-error-msg {
  font-size: 12px;
  color: var(--ink);
  font-weight: var(--fw-semibold);
  margin-bottom: 4px;
  word-break: break-word;
}
.dbg-error-stack { margin-top: 6px; }
.dbg-error-stack summary {
  font-size: 10.5px;
  color: var(--ink-muted);
  cursor: pointer;
  font-weight: var(--fw-medium);
}
.dbg-error-stack pre {
  font-size: 10px;
  color: var(--ink-secondary);
  background: var(--surface);
  padding: 8px;
  border-radius: 4px;
  margin-top: 6px;
  overflow-x: auto;
  font-family: var(--font-mono);
  line-height: 1.5;
}

.dbg-perf-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 2px;
}
.dbg-perf-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: var(--bg-subtle);
  border-radius: var(--radius-xs);
  font-size: 11.5px;
}
.dbg-perf-row:hover { background: var(--surface-hover); }
.dbg-perf-label {
  color: var(--ink-secondary);
  font-weight: var(--fw-medium);
}
.dbg-perf-value {
  font-family: var(--font-mono);
  color: var(--ink);
  font-weight: var(--fw-semibold);
  font-variant-numeric: tabular-nums;
}
.dbg-perf-value small {
  color: var(--ink-muted);
  font-weight: var(--fw-regular);
  font-size: 10px;
  margin-left: 2px;
}

.dbg-action-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 8px;
}
.dbg-action-btn {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 4px;
  padding: 10px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-family: inherit;
  text-align: left;
  transition: all var(--t-fast);
  color: var(--ink-secondary);
}
.dbg-action-btn:hover {
  border-color: var(--brand);
  background: var(--brand-soft);
  color: var(--brand-hover);
  transform: translateY(-1px);
  box-shadow: var(--elev-1);
}
.dbg-action-btn strong {
  font-size: 12px;
  color: var(--ink);
  font-weight: var(--fw-semibold);
}
.dbg-action-btn span {
  font-size: 10.5px;
  color: var(--ink-muted);
  font-weight: var(--fw-regular);
}
.dbg-action-btn-warn { border-color: var(--warn-border); }
.dbg-action-btn-warn strong { color: var(--warn-fg); }
.dbg-action-btn-warn:hover {
  background: var(--warn-soft);
  border-color: var(--warn);
  color: var(--warn-fg);
}

.dbg-empty {
  text-align: center;
  padding: 30px 16px;
  color: var(--ink-muted);
  font-size: 12px;
  background: var(--bg-subtle);
  border-radius: var(--radius-sm);
}
.dbg-empty code {
  background: var(--surface);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--ink-secondary);
}

.dbg-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 12px;
  background: var(--bg-subtle);
  border-top: 1px solid var(--divider);
  font-size: 10px;
  color: var(--ink-muted);
}
.dbg-hint kbd {
  background: var(--surface);
  padding: 1px 5px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  border: 1px solid var(--border);
  font-weight: var(--fw-semibold);
}
.dbg-version {
  font-family: var(--font-mono);
  font-size: 9.5px;
  color: var(--ink-muted);
}

.dbg-resize-handle {
  position: absolute;
  bottom: 0; right: 0;
  width: 14px; height: 14px;
  cursor: nwse-resize;
  background: linear-gradient(135deg, transparent 50%, var(--ink-muted) 50%, var(--ink-muted) 60%, transparent 60%, transparent 70%, var(--ink-muted) 70%, var(--ink-muted) 80%, transparent 80%);
  opacity: 0.4;
}
.dbg-resize-handle:hover { opacity: 0.8; }

/* ===== Toasts (notifications non-bloquantes) ===== */
.toast-container { 
  position: fixed; 
  bottom: 24px; 
  right: 24px; 
  z-index: var(--z-toast); 
  display: flex; 
  flex-direction: column; 
  gap: 10px; 
  pointer-events: none; 
}
.toast { 
  pointer-events: auto; 
  min-width: 300px; 
  max-width: 440px; 
  padding: 14px 16px 14px 14px; 
  background: var(--surface); 
  border: 1px solid var(--border); 
  border-left: 3px solid var(--ink-muted); 
  border-radius: var(--radius); 
  box-shadow: var(--elev-3); 
  display: flex; 
  align-items: flex-start; 
  gap: 12px; 
  font-size: var(--fs-base); 
  color: var(--ink); 
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
  position: relative;
  backdrop-filter: blur(8px);
}
.toast.toast-out { animation: toastOut 0.2s ease-in forwards; }
.toast-icon { font-size: 20px; line-height: 1.3; flex-shrink: 0; }
.toast-content { flex: 1; min-width: 0; padding-right: 8px; }
.toast-title { font-weight: var(--fw-bold); font-size: var(--fs-base); line-height: 1.3; margin-bottom: 2px; color: var(--ink); }
.toast-message { font-size: var(--fs-sm); color: var(--ink-secondary); line-height: 1.4; }
.toast-close { 
  position: absolute; 
  top: 8px; right: 10px; 
  background: none; border: none; 
  color: var(--ink-muted); 
  font-size: 18px; 
  cursor: pointer; 
  padding: 0 6px; 
  line-height: 1; 
  border-radius: 4px; 
  transition: all var(--t-fast); 
}
.toast-close:hover { background: var(--bg-subtle); color: var(--ink); }
.toast.toast-ok { border-left-color: var(--ok); }
.toast.toast-warn { border-left-color: var(--warn); }
.toast.toast-err { border-left-color: var(--danger); }
.toast.toast-info { border-left-color: var(--info); }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(40px) scale(0.95); } }


/* GRILLES OUTILS */
/* CONTENEUR ET GRILLES OUTILS (Centrage parfait) */
.tools-container { 
  max-width: 1100px; /* Largeur maximale fixe */
  margin: 0 auto;    /* Marges automatiques pour centrer parfaitement */
  padding: 40px; 
}

.tool-grid { 
  display: grid; 
  grid-template-columns: 1fr 1fr; /* Force 2 colonnes parfaitement égales */
  gap: 30px; 
  align-items: stretch; /* Étire les cartes pour qu'elles fassent la même hauteur */
}

/* Passage sur 1 seule colonne pour les petits écrans */
@media (max-width: 900px) {
  .tool-grid { grid-template-columns: 1fr; }
}

.tool-card { 
  background: var(--surface); 
  border: 1px solid var(--border); 
  border-radius: var(--radius-md); 
  padding: var(--space-5); 
  display: flex; 
  flex-direction: column; 
  box-shadow: var(--elev-1);
  transition: all var(--t-base);
  position: relative;
  overflow: hidden;
}
.tool-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--brand) 0%, var(--brand-hover) 100%);
  opacity: 0;
  transition: opacity var(--t-base);
}
.tool-card:hover {
  border-color: var(--border-strong);
  box-shadow: var(--elev-3);
  transform: translateY(-2px);
}
.tool-card:hover::before { opacity: 1; }

.tool-card h3 { 
  color: var(--ink); 
  font-weight: var(--fw-bold); 
  font-size: var(--fs-lg); 
  margin-bottom: var(--space-4); 
  display: flex; 
  align-items: center; 
  gap: var(--space-2);
  letter-spacing: -0.3px;
}

.tool-textarea { 
  width: 100%; 
  padding: 12px; 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm); 
  font-family: 'JetBrains Mono', monospace; 
  font-size: 13px; 
  background: var(--bg); 
  outline: none; 
  resize: vertical; 
  margin-bottom: 12px; 
  flex: 1; /* Permet à la zone de texte de prendre tout l'espace disponible */
}
.tool-textarea:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px var(--secondary-light); }

/* SIDEBAR */
/* ============================================================
   v17 — SIDEBAR collapsible (3 états : full / collapsed / hidden)
   ============================================================ */
.sidebar { 
  width: 248px; 
  background: var(--surface); 
  border-right: 1px solid var(--border); 
  display: flex; 
  flex-direction: column; 
  position: fixed; 
  top: 0; left: 0; bottom: 0; 
  z-index: var(--z-sticky); 
  transition: width var(--t-base), transform var(--t-base), background var(--t-base), border-color var(--t-base);
}

/* État collapsed : icônes uniquement */
.sidebar.collapsed { width: 60px; }
.sidebar.collapsed .brand-name,
.sidebar.collapsed .nav-section-label,
.sidebar.collapsed .nav-section-chevron,
.sidebar.collapsed .nav-search-btn span:not(.nav-search-icon),
.sidebar.collapsed .nav-search-btn kbd,
.sidebar.collapsed .nav-item span:not(.nav-icon) { 
  display: none; 
}
/* Cacher le texte brut (non wrappé) dans nav-item */
.sidebar.collapsed .nav-item {
  font-size: 0;
}
.sidebar.collapsed .nav-item .nav-icon {
  font-size: 16px; /* Restaurer la taille de l'icône (au cas où) */
}
.sidebar.collapsed .sidebar-header { 
  padding: var(--space-4) 12px; 
  flex-direction: column;
  gap: var(--space-3);
}
.sidebar.collapsed .brand { 
  justify-content: center; 
  width: 100%;
}
.sidebar.collapsed .sidebar-nav { 
  padding: var(--space-3) 8px;
  align-items: center;
}
.sidebar.collapsed .nav-item { 
  justify-content: center; 
  padding: 10px 0;
  width: 40px;
  position: relative;
}
.sidebar.collapsed .nav-item .nav-icon { 
  width: 20px; height: 20px;
}
.sidebar.collapsed .nav-item.active::before { 
  width: 3px; 
  left: -8px;
  height: 22px;
}
.sidebar.collapsed .nav-section { 
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.sidebar.collapsed .nav-section-header { 
  padding: 4px 0; 
  width: 40px;
  justify-content: center;
}
.sidebar.collapsed .nav-section-header::after {
  content: '';
  display: block;
  width: 24px;
  height: 1px;
  background: var(--divider);
  margin: 6px auto 0;
}
.sidebar.collapsed .nav-section-body { 
  width: 100%;
  align-items: center; 
}
.sidebar.collapsed .nav-search-btn { 
  width: 40px; 
  padding: 10px 0; 
  justify-content: center;
  margin-bottom: var(--space-3);
}
.sidebar.collapsed .nav-footer .nav-item { width: 40px; }

/* Tooltips au hover quand collapsed */
.sidebar.collapsed .nav-item,
.sidebar.collapsed .nav-search-btn {
  position: relative;
}
.sidebar.collapsed .nav-item::after,
.sidebar.collapsed .nav-search-btn::after {
  content: attr(data-tooltip);
  position: absolute;
  left: calc(100% + 12px);
  top: 50%;
  transform: translateY(-50%);
  background: var(--ink);
  color: var(--ink-inverse);
  padding: 5px 10px;
  border-radius: var(--radius-sm);
  font-size: var(--fs-xs);
  font-weight: var(--fw-semibold);
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--t-fast);
  z-index: var(--z-overlay);
  box-shadow: var(--elev-3);
}
.sidebar.collapsed .nav-item:hover::after,
.sidebar.collapsed .nav-search-btn:hover::after {
  opacity: 1;
}
[data-theme="dark"] .sidebar.collapsed .nav-item::after,
[data-theme="dark"] .sidebar.collapsed .nav-search-btn::after {
  background: var(--surface-elev);
  color: var(--ink);
  border: 1px solid var(--border);
}

/* État hidden : sidebar complètement cachée */
.sidebar.hidden {
  transform: translateX(-100%);
}

/* Bouton burger flottant */
.sidebar-toggle-btn {
  position: fixed;
  top: 14px;
  left: 14px;
  width: 36px; height: 36px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--ink-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: calc(var(--z-sticky) + 1);
  box-shadow: var(--elev-2);
  transition: all var(--t-base);
  opacity: 0;
  pointer-events: none;
}
.sidebar.hidden ~ .sidebar-toggle-btn,
.sidebar-toggle-btn.always-visible {
  opacity: 1;
  pointer-events: auto;
}
.sidebar-toggle-btn:hover {
  background: var(--bg-subtle);
  border-color: var(--brand);
  color: var(--brand);
}
.sidebar-toggle-btn svg { display: block; }

/* Bouton intégré dans le header sidebar pour collapse */
.sidebar-collapse-btn {
  width: 28px; height: 28px;
  border-radius: var(--radius-xs);
  background: transparent;
  border: 1px solid transparent;
  color: var(--ink-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--t-fast);
  flex-shrink: 0;
}
.sidebar-collapse-btn:hover {
  background: var(--bg-subtle);
  color: var(--ink);
  border-color: var(--border);
}
.sidebar-collapse-btn svg { 
  display: block; 
  transition: transform var(--t-base);
}
.sidebar.collapsed .sidebar-collapse-btn svg {
  transform: rotate(180deg);
}
.sidebar.collapsed .sidebar-collapse-btn {
  width: 32px; height: 32px;
  margin-top: 4px;
}

.sidebar-header { 
  padding: var(--space-5) var(--space-5) var(--space-4); 
  border-bottom: 1px solid var(--divider); 
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-2);
}
.brand { display: flex; align-items: center; gap: var(--space-3); flex: 1; min-width: 0; }
.brand-logo { 
  width: 36px; height: 36px; 
  background: linear-gradient(135deg, var(--primary) 0%, var(--brand) 100%);
  border-radius: 9px; 
  display: flex; align-items: center; justify-content: center; 
  box-shadow: var(--elev-2);
  flex-shrink: 0;
}
[data-theme="dark"] .brand-logo {
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
}
.brand-name { 
  font-size: 17px; 
  font-weight: var(--fw-extrabold); 
  color: var(--ink); 
  letter-spacing: -0.5px; 
  font-family: var(--font-ui);
  line-height: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-name span { 
  background: linear-gradient(135deg, var(--brand) 0%, var(--brand-hover) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* Bouton thème dans le header sidebar */
.theme-toggle {
  width: 32px; height: 32px;
  border-radius: var(--radius-sm);
  background: transparent;
  border: 1px solid var(--border);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-secondary);
  transition: all var(--t-base);
  flex-shrink: 0;
}
.theme-toggle:hover { 
  background: var(--bg-subtle); 
  border-color: var(--brand); 
  color: var(--brand);
  transform: rotate(15deg);
}
.theme-toggle svg { display: block; }
.theme-toggle #theme-icon { display: flex; }

.sidebar-nav { 
  flex: 1; 
  padding: var(--space-4) var(--space-3); 
  overflow-y: auto; 
  display: flex; 
  flex-direction: column; 
  gap: var(--space-1); 
}

.nav-item { 
  display: flex; 
  align-items: center; 
  gap: 10px; 
  padding: 8px 12px; 
  border-radius: var(--radius-sm); 
  cursor: pointer; 
  transition: all var(--t-fast); 
  color: var(--ink-secondary); 
  font-size: var(--fs-base); 
  font-weight: var(--fw-medium); 
  border: none; 
  background: none; 
  width: 100%; 
  margin-bottom: 2px; 
  text-align: left; 
  font-family: inherit; 
  line-height: 1.3;
  position: relative;
}
.nav-item:hover { 
  background: var(--bg-subtle); 
  color: var(--ink); 
}
.nav-item.active { 
  background: var(--brand-soft); 
  color: var(--brand-hover);
  font-weight: var(--fw-semibold);
  padding-left: 12px;
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: 0; top: 50%;
  transform: translateY(-50%);
  width: 3px; height: 18px;
  background: var(--brand);
  border-radius: 0 2px 2px 0;
}
[data-theme="dark"] .nav-item.active { 
  color: var(--brand-hover); 
  background: var(--brand-soft);
}
.nav-item .nav-icon { 
  font-size: 15px; 
  flex-shrink: 0; 
  width: 18px; 
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--ink-muted);
  transition: color var(--t-fast);
}
.nav-item .nav-icon svg { display: block; }
.nav-item:hover .nav-icon { color: var(--ink-secondary); }
.nav-item.active .nav-icon { color: var(--brand); }

/* Bouton de recherche épinglé */
.nav-search-btn { 
  display: flex; 
  align-items: center; 
  justify-content: space-between; 
  gap: var(--space-2); 
  padding: 10px 12px; 
  margin-bottom: var(--space-4); 
  background: var(--bg-subtle);
  color: var(--ink-secondary); 
  font-weight: var(--fw-medium); 
  font-size: var(--fs-sm); 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm); 
  cursor: pointer; 
  font-family: inherit; 
  transition: all var(--t-base); 
}
.nav-search-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.nav-search-icon {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 14px;
  height: 14px;
  color: var(--ink-muted);
  transition: color var(--t-base);
}
.nav-search-icon svg { display: block; }
.nav-search-btn:hover .nav-search-icon { color: var(--brand-hover); }
.nav-search-btn:hover { 
  background: var(--brand-soft); 
  color: var(--brand-hover); 
  border-color: var(--brand); 
}
.nav-search-btn kbd { 
  font-family: var(--font-mono); 
  background: var(--surface); 
  padding: 2px 6px; 
  border-radius: 4px; 
  border: 1px solid var(--border); 
  font-size: var(--fs-xxs); 
  font-weight: var(--fw-semibold); 
  color: var(--ink-muted);
}
.nav-search-btn:hover kbd { 
  background: var(--surface); 
  border-color: var(--brand); 
  color: var(--brand-hover);
}

/* Sections de navigation */
.nav-section { margin-bottom: var(--space-3); }
.nav-section-header { 
  display: flex; 
  align-items: center; 
  gap: 6px; 
  width: 100%; 
  padding: 8px 12px 6px; 
  background: none; 
  border: none; 
  cursor: pointer; 
  font-family: inherit; 
  color: var(--ink-muted); 
  font-size: var(--fs-xxs); 
  font-weight: var(--fw-bold); 
  text-transform: uppercase; 
  letter-spacing: 0.8px; 
  transition: color var(--t-fast); 
}
.nav-section-header:hover { color: var(--ink); }
.nav-section-chevron { 
  display: inline-flex; 
  align-items: center;
  justify-content: center;
  transition: transform var(--t-base); 
  color: var(--ink-muted);
  width: 12px;
  height: 12px;
}
.nav-section-chevron svg { display: block; width: 12px; height: 12px; }
.nav-section.nav-collapsed .nav-section-chevron { transform: rotate(-90deg); }
.nav-section-body { 
  display: flex; 
  flex-direction: column; 
  gap: 1px; 
  max-height: 600px; 
  overflow: hidden; 
  transition: max-height var(--t-slow); 
}
.nav-section.nav-collapsed .nav-section-body { max-height: 0; }

/* Footer nav (Configuration) */
.nav-footer { 
  margin-top: auto; 
  padding-top: var(--space-3); 
  border-top: 1px solid var(--divider); 
}

/* MAIN CONTENT */
.main-content { 
  flex: 1; 
  margin-left: 248px; 
  position: relative; 
  overflow-x: hidden;
  transition: margin-left var(--t-base);
}
body.sb-collapsed .main-content { margin-left: 60px; }
body.sb-hidden .main-content { margin-left: 0; }
body.sb-hidden .page-header { padding-left: 64px; }
.page { display: none; animation: fadeIn 0.3s var(--t-base); }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* page-craminator: ne jamais utiliser display:none pour préserver Chart.js */
#page-craminator { display: block !important; position: absolute; left: -99999px; top: 0; width: 100%; pointer-events: none; overflow: hidden; height: 0; }
#page-craminator.active { position: relative; left: 0; pointer-events: auto; height: auto; overflow: visible; animation: fadeIn 0.4s ease; }
#page-facturator { display: block !important; position: absolute; left: -99999px; top: 0; width: 100%; pointer-events: none; overflow: hidden; height: 0; }
#page-facturator.active { position: relative; left: 0; pointer-events: auto; height: auto; overflow: visible; animation: fadeIn 0.4s ease; }

.page-header { 
  padding: var(--space-6) 40px var(--space-5); 
  background: var(--surface); 
  border-bottom: 1px solid var(--border); 
  position: sticky; 
  top: 0; 
  z-index: var(--z-sticky); 
  display: flex; 
  justify-content: space-between; 
  align-items: flex-end;
  gap: var(--space-4);
  backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.85);
}
[data-theme="dark"] .page-header { background: rgba(21, 30, 46, 0.85); }
.page-header h1 { 
  font-size: var(--fs-2xl); 
  font-weight: var(--fw-extrabold); 
  color: var(--ink); 
  font-family: var(--font-ui);
  letter-spacing: -0.7px;
  line-height: 1.1;
}
.page-header p { 
  color: var(--ink-muted); 
  font-size: var(--fs-md); 
  margin-top: 6px; 
  font-weight: var(--fw-regular);
  line-height: 1.4;
}

/* HERO & DASHBOARD */
.hero-section { padding: 40px; }
.welcome-card { background: var(--primary); border-radius: var(--radius-lg); padding: 40px; border: 1px solid var(--border-light); margin-bottom: 30px; color: var(--surface); box-shadow: var(--shadow); }
.welcome-text h2 { font-size: 32px; margin-bottom: 12px; font-weight: 800; text-transform: uppercase; font-family: 'Fraunces', serif;}
.welcome-text p { color: var(--secondary); max-width: 600px; line-height: 1.6; font-size: 16px; font-weight: 500; }

/* GRID & CARDS */
.section-title { 
  font-size: var(--fs-md); 
  font-weight: var(--fw-bold); 
  margin-bottom: var(--space-3); 
  margin-top: var(--space-5);
  color: var(--ink); 
  padding: 0 40px; 
  letter-spacing: -0.2px;
  font-family: var(--font-ui);
  display: flex;
  align-items: center;
  gap: var(--space-2);
}
.section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 16px;
  background: var(--brand);
  border-radius: 2px;
}
.content-grid { padding: 0 40px var(--space-6) 40px; display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--space-3); }
.link-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; cursor: pointer; transition: all var(--transition); text-decoration: none; color: inherit; display: block; border-top: 4px solid var(--secondary); }
.link-card:hover { border-color: var(--secondary); box-shadow: var(--shadow); transform: translateY(-3px); }
.link-card-cat { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; margin-top: 12px; background: var(--secondary-light); color: var(--secondary-dark); }

/* ============================================================
   v14 — CONFIGURATION & TABLEAUX
   ============================================================ */
.config-container { padding: var(--space-6) 40px; }
.config-card { 
  background: var(--surface); 
  border-radius: var(--radius-md); 
  border: 1px solid var(--border); 
  overflow: hidden; 
  margin-bottom: var(--space-5);
  box-shadow: var(--elev-1);
  transition: box-shadow var(--t-base);
}
.config-card:hover { box-shadow: var(--elev-2); }
.config-header { 
  padding: var(--space-4) var(--space-5); 
  border-bottom: 1px solid var(--divider); 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
  background: var(--bg-subtle);
}
.config-header h3 { 
  color: var(--ink); 
  font-weight: var(--fw-bold); 
  font-size: var(--fs-md);
  letter-spacing: -0.2px;
}
table { width: 100%; border-collapse: collapse; }
th { 
  text-align: left; 
  padding: 12px var(--space-5); 
  font-size: var(--fs-xxs); 
  color: var(--ink-muted); 
  text-transform: uppercase; 
  border-bottom: 1px solid var(--border); 
  font-weight: var(--fw-bold);
  letter-spacing: 0.6px;
  background: var(--bg-subtle);
}
td { 
  padding: 12px var(--space-5); 
  font-size: var(--fs-base); 
  border-bottom: 1px solid var(--divider); 
  font-weight: var(--fw-regular);
  color: var(--ink-secondary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tbody tr { transition: background var(--t-fast); }
tbody tr:hover { background: var(--bg-subtle); }

/* ============================================================
   v14 — BOUTONS refondus
   ============================================================ */
.btn { 
  padding: 8px 14px; 
  border-radius: var(--radius-sm); 
  font-weight: var(--fw-semibold); 
  cursor: pointer; 
  border: 1px solid transparent; 
  font-family: inherit; 
  font-size: var(--fs-base); 
  transition: all var(--t-fast); 
  display: inline-flex; 
  align-items: center; 
  justify-content: center; 
  gap: 6px;
  line-height: 1;
  white-space: nowrap;
  user-select: none;
  position: relative;
  outline: none;
}
.btn:focus-visible { box-shadow: var(--elev-glow); }
.btn:active { transform: translateY(1px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-primary { 
  background: var(--primary); 
  color: white;
  box-shadow: var(--elev-1), inset 0 1px 0 rgba(255,255,255,0.1);
}
.btn-primary:hover:not(:disabled) { 
  background: var(--primary-hover); 
  box-shadow: var(--elev-2), inset 0 1px 0 rgba(255,255,255,0.15);
}
[data-theme="dark"] .btn-primary { 
  background: var(--brand); color: var(--ink-inverse);
}
[data-theme="dark"] .btn-primary:hover:not(:disabled) { 
  background: var(--brand-hover);
}

.btn-secondary { 
  background: var(--brand); 
  color: white;
  box-shadow: var(--elev-1), inset 0 1px 0 rgba(255,255,255,0.15);
}
.btn-secondary:hover:not(:disabled) { 
  background: var(--brand-hover); 
  box-shadow: var(--elev-2);
}

.btn-danger { 
  background: var(--danger-soft); 
  color: var(--danger-fg); 
  border-color: var(--danger-border);
}
.btn-danger:hover:not(:disabled) { 
  background: var(--danger); 
  color: white; 
  border-color: var(--danger);
}

.btn-outline { 
  background: var(--surface); 
  border: 1px solid var(--border); 
  color: var(--ink-secondary); 
}
.btn-outline:hover:not(:disabled) { 
  background: var(--surface-hover); 
  border-color: var(--border-strong); 
  color: var(--ink); 
}

.btn-ghost {
  background: transparent;
  border: 1px solid transparent;
  color: var(--ink-secondary);
}
.btn-ghost:hover:not(:disabled) {
  background: var(--bg-subtle);
  color: var(--ink);
}

/* Tailles */
.btn-sm { padding: 5px 10px; font-size: var(--fs-sm); }
.btn-lg { padding: 11px 20px; font-size: var(--fs-md); }

/* ============================================================
   v14 — MODALS refondues
   ============================================================ */
.modal-overlay { 
  position: fixed; 
  inset: 0; 
  background: rgba(15, 23, 42, 0.55); 
  backdrop-filter: blur(6px); 
  -webkit-backdrop-filter: blur(6px);
  display: none; 
  align-items: center; 
  justify-content: center; 
  z-index: var(--z-modal); 
  animation: overlayIn var(--t-base);
}
.modal-overlay.open { display: flex; }
@keyframes overlayIn { from { opacity: 0; } to { opacity: 1; } }

.modal { 
  background: var(--surface); 
  padding: var(--space-6); 
  border-radius: var(--radius-lg); 
  width: 480px;
  max-width: 92vw;
  box-shadow: var(--elev-4); 
  border: 1px solid var(--border);
  animation: modalIn var(--t-base);
}
@keyframes modalIn { 
  from { opacity: 0; transform: translateY(20px) scale(0.98); } 
  to { opacity: 1; transform: translateY(0) scale(1); } 
}

.modal h3 { 
  color: var(--ink); 
  font-weight: var(--fw-bold); 
  font-size: var(--fs-lg);
  margin-bottom: var(--space-4);
}

.form-group { margin-bottom: var(--space-4); }
.form-group label { 
  display: block; 
  font-size: var(--fs-xs); 
  margin-bottom: 6px; 
  font-weight: var(--fw-semibold); 
  color: var(--ink-secondary); 
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.form-group input, 
.form-group select, 
.form-group textarea { 
  width: 100%; 
  padding: 10px 12px; 
  border: 1px solid var(--border); 
  border-radius: var(--radius-sm); 
  font-family: inherit; 
  font-size: var(--fs-md); 
  background: var(--surface); 
  outline: none; 
  transition: all var(--t-fast);
  color: var(--ink);
}
.form-group input:hover,
.form-group select:hover,
.form-group textarea:hover {
  border-color: var(--border-strong);
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--brand);
  box-shadow: var(--elev-glow);
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px var(--secondary-light); }
.form-group textarea { resize: vertical; min-height: 80px; }

/* =========================================
   CRAMINATOR - CSS ADAPTÉ AU MODE CLAIR
   ========================================= */
#page-craminator {
  /* Mapping des variables CRAminator (Mode Sombre) vers Compagnon (Mode Clair) */
  --bg-primary: var(--bg);
  --bg-card: var(--surface);
  --bg-card-hover: var(--bg);
  --bg-surface: #F8FAFC;
  --border-subtle: var(--border);
  --border-accent: var(--primary);
  --text-primary: var(--ink);
  --text-secondary: var(--ink-secondary);
  --text-muted: var(--ink-muted);
  --accent-blue: var(--primary);
  --accent-cyan: var(--primary-light);
  --accent-emerald: var(--secondary);
  --accent-amber: #D97706; /* Assombri pour lisibilité sur fond clair */
  --accent-red: #DC2626;
  --accent-purple: #7C3AED;
  --accent-pink: #DB2777;
  --gradient-main: linear-gradient(135deg, var(--primary), var(--secondary));
}

#page-craminator .glass-card, #page-craminator .glass-card-light {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: none;
}
#page-craminator .btn-gradient { background: var(--primary); color: white; border:none; padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; }
#page-craminator .btn-gradient:hover { background: var(--primary-light); }
#page-craminator .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--border); padding: 8px 16px; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; }
#page-craminator .btn-ghost:hover { background: var(--bg); border-color: var(--primary); }

#page-craminator .drop-zone { border: 2px dashed var(--border); border-radius: var(--radius); background: var(--bg-surface); transition: all 0.3s; }
#page-craminator .drop-zone:hover { border-color: var(--primary); background: var(--surface); }

/* Graphes CRAminator - fond transparent sur fond clair */
#page-craminator canvas { background: transparent !important; }

/* Source manager */
#page-craminator .source-manager {
  background: linear-gradient(135deg, rgba(94, 176, 145, 0.05), rgba(27, 59, 92, 0.05));
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* Conteneurs de graphes */
#page-craminator .chart-container,
#page-craminator .chart-container-large { position: relative; width: 100%; }
#page-craminator .chart-container { position: relative; height: 280px; width: 100%; }
.chart-container-large { position: relative; height: 300px; width: 100%; }
#page-craminator .chart-container-large { height: 300px; }

/* Heatmap */
#page-craminator #heatmap-container .w-3 { 
  border-radius: 2px;
}

/* RAC progress bars */
#page-craminator .h-1\.5 { background: var(--border-light); }

/* Badges et tags dans les tableaux */
#page-craminator tbody td { color: var(--ink-secondary); }
#page-craminator tbody tr:hover { background: var(--bg); }

/* Source chips */
#page-craminator .source-0 { background: rgba(27,59,92,0.08); border-color: rgba(27,59,92,0.2); color: var(--primary); }
#page-craminator .source-1 { background: rgba(94,176,145,0.08); border-color: rgba(94,176,145,0.3); color: var(--secondary-dark); }
#page-craminator .source-2 { background: rgba(42,81,122,0.08); border-color: rgba(42,81,122,0.2); color: var(--primary-light); }

/* Sticky nav du CRAminator */
#page-craminator .sticky { background: rgba(255,255,255,0.97) !important; }

/* Scrollbar dans le CRAminator */
#page-craminator ::-webkit-scrollbar { width: 6px; height: 6px; }
#page-craminator ::-webkit-scrollbar-track { background: var(--bg); }
#page-craminator ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#page-craminator ::-webkit-scrollbar-thumb:hover { background: var(--ink-muted); }

/* Inputs dans le CRAminator */
#page-craminator input, #page-craminator select, #page-craminator textarea {
  background: var(--surface);
  border-color: var(--border);
  color: var(--ink);
}
#page-craminator input:focus, #page-craminator select:focus {
  border-color: var(--secondary);
  outline: none;
  box-shadow: 0 0 0 3px var(--secondary-light);
}

#page-craminator .ts-control { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: 8px !important; color: var(--ink) !important; }
#page-craminator .ts-dropdown { background: var(--surface) !important; border: 1px solid var(--border) !important; color: var(--ink) !important; }
#page-craminator .ts-dropdown .option { color: var(--ink) !important; }
#page-craminator .ts-dropdown .active { background: var(--bg) !important; color: var(--primary) !important; }

#page-craminator table th { font-family: 'Outfit', sans-serif; font-size: 11px; text-transform: uppercase; color: var(--ink-muted); font-weight: 700; border-bottom: 1px solid var(--border); }
#page-craminator table td { font-family: 'Outfit', sans-serif; font-size: 13px; color: var(--ink-secondary); border-bottom: 1px solid var(--border-light); }

/* BIBLE TMA */
.bible-content { padding: 40px; max-width: 900px; margin: 0 auto; }
.b-section { margin-bottom: 60px; }
.b-header { display: flex; gap: 16px; align-items: flex-start; margin-bottom: 24px; }
.b-icon { width: 44px; height: 44px; background: var(--primary); color: var(--surface); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.b-label { font-size: 11px; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
.b-title { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 6px; font-family: 'Fraunces', serif;}
.b-desc { color: var(--ink-secondary); font-size: 14px; }
.b-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin: 20px 0; }
.b-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; border-left: 4px solid var(--secondary); }
.b-card-title { font-weight: 800; font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; color: var(--primary); }
.b-card-body { font-size: 13px; color: var(--ink-secondary); line-height: 1.6; }
.b-alert { padding: 16px; border-radius: var(--radius-sm); margin: 20px 0; font-size: 14px; display: flex; gap: 12px; line-height: 1.5; border-left: 4px solid; }
.b-alert-amber { background: #FFFDF5; border-color: #E2C07D; color: #7A6125; }

/* SQL GENERATOR */
.sql-layout { display: flex; height: calc(100vh - 110px); }
.sql-left { width: 420px; overflow-y: auto; padding: 30px 40px; border-right: 1px solid var(--border); background: var(--surface); }
.sql-left::-webkit-scrollbar { width: 4px; }
.sql-left::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.sql-right { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
.sql-section-title { font-size: 11px; font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; color: var(--ink-muted); text-transform: uppercase; margin: 24px 0 12px; font-weight: 700; }
.sql-dml-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
.sql-dml-btn { padding: 8px 4px; text-align: center; font-size: 12px; font-family: 'JetBrains Mono', monospace; font-weight: 600; cursor: pointer; background: var(--surface); color: var(--ink-secondary); border: 1px solid var(--border); border-radius: 6px; transition: all 0.15s; }
.sql-dml-btn.active { background: var(--primary); color: var(--surface); border-color: var(--primary); }
.sql-clist { max-height: 180px; overflow-y: auto; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: flex; flex-direction: column; gap: 6px; }
.sql-cr { display: flex; align-items: flex-start; gap: 8px; font-size: 11px; color: var(--ink-secondary); line-height: 1.4; }
.sql-cd { width: 5px; height: 5px; border-radius: 50%; background: var(--secondary); flex-shrink: 0; margin-top: 5px; opacity: 0.8; }
.sql-out-header { padding: 16px 30px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface); }
.sql-carea { flex: 1; overflow-y: auto; background: #0F172A; position: relative; }
.sql-cc { padding: 20px 24px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 22px; white-space: pre; color: #F8FAFC; }
.sql-cc .kw { color: #F472B6; font-weight: 500; }
.sql-cc .cm { color: #64748B; font-style: italic; }
.sql-cc .st { color: #7DD3FC; }
.sql-cc .tp { color: #38BDF8; }

/* =========================================
   ORGANISATOR - TIMER POMODORO & TÂCHES
   ========================================= */
#page-organisator { padding: 40px; max-width: 1200px; margin: 0 auto; }
#page-organisator .org-container { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }
#page-organisator .org-sidebar { display: flex; flex-direction: column; gap: 20px; }
#page-organisator .org-content { display: flex; flex-direction: column; gap: 20px; }

#page-organisator .pomodoro-card { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); color: white; padding: 28px; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
#page-organisator .pomodoro-card h3 { margin-bottom: 16px; font-size: 16px; font-weight: 700; }
#page-organisator #timerDisplay { font-size: 4rem; font-weight: 800; text-align: center; margin: 20px 0; font-family: 'JetBrains Mono', monospace; }
#page-organisator .timer-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
#page-organisator .timer-buttons button { flex: 1; padding: 10px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: 0.2s; }
#page-organisator .timer-buttons button:hover { background: rgba(255,255,255,0.3); }
#page-organisator .timer-presets { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
#page-organisator .timer-presets button { padding: 6px 12px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
#page-organisator .timer-presets button:hover { background: rgba(255,255,255,0.3); }
#page-organisator .timer-custom { display: flex; gap: 8px; margin-top: 10px; }
#page-organisator .timer-custom input { flex: 1; padding: 8px; border: none; border-radius: var(--radius-sm); text-align: center; font-weight: 600; color: var(--primary); }

#page-organisator .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
#page-organisator .form-card h3 { color: var(--primary); font-weight: 700; margin-bottom: 16px; }
#page-organisator .form-group { margin-bottom: 12px; }
#page-organisator .form-group label { display: block; font-size: 12px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; }
#page-organisator .form-group input, #page-organisator .form-group select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; outline: none; }
#page-organisator .form-group input:focus, #page-organisator .form-group select:focus { border-color: var(--secondary); box-shadow: 0 0 0 3px var(--secondary-light); }
#page-organisator .form-row { display: flex; gap: 10px; }
#page-organisator .form-row select { flex: 1; }
#page-organisator .checkbox-group { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
#page-organisator .checkbox-group input { width: auto; }
#page-organisator .checkbox-group label { margin: 0; text-transform: none; font-weight: 500; font-size: 13px; }

#page-organisator .task-item { background: var(--bg); padding: 14px; border-radius: var(--radius-sm); margin-bottom: 10px; display: flex; align-items: center; gap: 12px; border-left: 4px solid var(--border); transition: 0.2s; }
#page-organisator .task-urgent { border-left-color: var(--danger); }
#page-organisator .task-moyen { border-left-color: #F59E0B; }
#page-organisator .task-bas { border-left-color: var(--secondary); }
#page-organisator .task-item.done { opacity: 0.5; }
#page-organisator .task-item.done .task-text { text-decoration: line-through; }
#page-organisator .task-checkbox { width: 20px; height: 20px; cursor: pointer; flex-shrink: 0; }
#page-organisator .task-content { flex: 1; }
#page-organisator .task-text { font-weight: 600; color: var(--ink); font-size: 14px; }
#page-organisator .task-meta { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
#page-organisator .task-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-right: 8px; }
#page-organisator .badge-tma { background: rgba(139, 92, 246, 0.1); color: #7C3AED; }
#page-organisator .badge-formation { background: rgba(6, 182, 212, 0.1); color: #0891B2; }
#page-organisator .badge-reunion { background: rgba(249, 115, 22, 0.1); color: #EA580C; }
#page-organisator .task-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; transition: 0.2s; flex-shrink: 0; }
#page-organisator .task-delete:hover { transform: scale(1.2); }

<script>// === Bridge functions (original sidebar -> modular router) ===
function navigateTo(page) {
  // Map original page names to module names
  var map = {'xml-viewer':'xmlviewer','xml_viewer':'xmlviewer'};
  Router.navigate(map[page] || page);
}
function toggleSidebar() {
  var sb = document.querySelector('.sidebar');
  if (!sb) return;
  if (sb.classList.contains('hidden')) {
    sb.classList.remove('hidden');
    document.body.classList.remove('sb-hidden');
  } else if (sb.classList.contains('collapsed')) {
    sb.classList.remove('collapsed');
    document.body.classList.remove('sb-collapsed');
    localStorage.setItem('cyrias_sidebar_state', JSON.stringify('full'));
  } else {
    sb.classList.add('collapsed');
    document.body.classList.add('sb-collapsed');
    localStorage.setItem('cyrias_sidebar_state', JSON.stringify('collapsed'));
  }
}
function toggleTheme() {
  var cur = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', cur);
  localStorage.setItem('cyrias_app_theme', JSON.stringify(cur));
  var icon = document.getElementById('theme-icon');
  if (icon) icon.innerHTML = cur === 'light' 
    ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
    : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>';
}
function toggleNavSection(name) {
  var sec = document.querySelector('.nav-section[data-section="' + name + '"]');
  if (sec) sec.classList.toggle('nav-collapsed');
}
function openGlobalSearch() {
  // Placeholder - Ctrl+K search not implemented in modular version
  Toast.info('Recherche rapide: Ctrl+K (bientôt disponible)');
}

</script>
