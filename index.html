<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrias Buddy — Portail Modulaire</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/main.css"> <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="app">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="9 12 12 15 17 10"/>
                    </svg>
                </div>
                <div class="brand-name">CYR<span>IAS</span> Bud<span>dy</span></div>
            </div>
            <button class="sidebar-collapse-btn" onclick="MenuSystem.toggleSidebar()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
            </button>
        </div>

        <div class="sidebar-nav">
            <div class="nav-section" data-section="quotidien">
                <button class="nav-section-header" onclick="MenuSystem.toggleAccordion('quotidien')">
                    <span class="nav-section-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                    <span class="nav-section-label">Espace quotidien</span>
                </button>
                <div class="nav-section-body">
                    <button class="nav-item active" onclick="MenuSystem.goTo('dashboard')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Accueil
                    </button>
                    <button class="nav-item" onclick="MenuSystem.goTo('clients')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/></svg></span> Espace Client 360
                    </button>
                </div>
            </div>

            <div class="nav-section" data-section="pilotage">
                <button class="nav-section-header" onclick="MenuSystem.toggleAccordion('pilotage')">
                    <span class="nav-section-chevron"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                    <span class="nav-section-label">Pilotage</span>
                </button>
                <div class="nav-section-body">
                    <button class="nav-item" onclick="MenuSystem.goTo('craminator')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 12v5"/><path d="M11 8v9"/><path d="M15 14v3"/><path d="M19 10v7"/></svg></span> CRAminator
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content" id="content">
        
        <div class="page" id="page-dashboard" style="display: block;">
            <div class="hero-section">
                <div style="padding: 28px 40px 12px 40px;">
                    <h1 style="font-size:24px; font-weight:700; color:var(--primary);">Bonjour Compagnon 👋</h1>
                    <p style="color:var(--ink-muted);">Bienvenue sur ton portail.</p>
                </div>
            </div>
        </div>

        <div class="page" id="page-clients" style="display: none;">
            <div class="page-header" style="padding: 28px 40px;">
                <h1 style="font-size:24px; font-weight:700; color:var(--primary);">🏢 Espace Client 360</h1>
                <p style="color:var(--ink-muted);">Pilotage et notes (Le HTML sera à coller ici)</p>
            </div>
        </div>

        <div class="page" id="page-craminator" style="display: none;">
            <div class="page-header" style="padding: 28px 40px;">
                <h1 style="font-size:24px; font-weight:700; color:var(--primary);">📊 CRAminator</h1>
                <p style="color:var(--ink-muted);">Analyse Excel (Le HTML sera à coller ici)</p>
            </div>
        </div>

    </main>
</div>

<script>
    const MenuSystem = {
        // 1. Navigation entre les pages
        goTo(pageId) {
            console.log("Clic sur :", pageId);

            // A) Activer le bouton du menu
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('onclick').includes(pageId)) {
                    btn.classList.add('active');
                }
            });

            // B) Cacher toutes les pages, afficher la bonne
            document.querySelectorAll('.page').forEach(page => {
                if (page.id === 'page-' + pageId) {
                    page.style.display = 'block'; // Affiche
                } else {
                    page.style.display = 'none';  // Cache
                }
            });

            // C) Lancer le script de la page (si le module existe)
            if (pageId === 'craminator' && window.CRAModule) CRAModule.init();
            if (pageId === 'clients' && window.ClientsModule) ClientsModule.init();
        },

        // 2. Ouvrir/Fermer l'accordéon du menu
        toggleAccordion(sectionId) {
            const section = document.querySelector(`.nav-section[data-section="${sectionId}"]`);
            if (section) section.classList.toggle('nav-collapsed');
        },

        // 3. Réduire la barre latérale globale
        toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('collapsed');
            document.body.classList.toggle('sb-collapsed');
        }
    };
</script>

</body>
</html>
