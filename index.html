<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">

<body>

<script>
// Prévention du flash blanc au chargement en mode sombre
(function(){try{var s=localStorage.getItem('cyrias_app_theme');var t=s?JSON.parse(s):(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>

<div class="app">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-logo">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12a9 9 0 1 1-6.219-8.56"/><polyline points="9 12 12 15 17 10"/>
                    </svg>
                </div>
                <div class="brand-name">CYR<span>IAS</span> Bud<span>dy</span></div>
            </div>
            <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Réduire / déplier (Ctrl+B)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                </svg>

        </div>

        <div class="sidebar-nav">
            <button class="nav-search-btn" onclick="openGlobalSearch()">

                    Recherche rapide
                </span>

            <div class="nav-section" data-section="quotidien">

                <div class="nav-section-body">
                    <button data-route="dashboard" class="nav-item active" onclick="navigateTo('dashboard')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span> Accueil
                    </button>
                    <button data-route="clients" class="nav-item" onclick="navigateTo('clients')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></span> Espace Client 360
                    </button>
                    <button data-route="organisator" class="nav-item" onclick="navigateTo('organisator')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg></span> Organisator
                    </button>
                    <button data-route="journal" class="nav-item" onclick="navigateTo('journal')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg></span> Journal de bord
                    </button>
                    <button data-route="notifcenter" class="nav-item" onclick="navigateTo('notifcenter')">

                    <button data-route="communicator" class="nav-item" onclick="navigateTo('communicator')">

                    <button data-route="links" class="nav-item" onclick="navigateTo('links')">

                </div>
            </div>

            <div class="nav-section" data-section="pilotage">
                <button class="nav-section-header" onclick="toggleNavSection('pilotage')">
                    <span class="nav-section-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                    <span class="nav-section-label">Pilotage</span>
                </button>
                <div class="nav-section-body">
                    <button data-route="direction" class="nav-item" onclick="navigateTo('direction')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg></span> Board Direction
                    </button>
                    <button data-route="craminator" class="nav-item" onclick="navigateTo('craminator')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 12v5"/><path d="M11 8v9"/><path d="M15 14v3"/><path d="M19 10v7"/></svg></span> CRAminator
                    </button>
                    <button data-route="facturator" class="nav-item" onclick="navigateTo('facturator')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17.5v-11"/></svg></span> Facturator
                    </button>
                    <button data-route="agregator" class="nav-item" onclick="navigateTo('agregator')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></span> Stafiz Agregator
                    </button>
                    <button data-route="kanban" class="nav-item" onclick="navigateTo('kanban')">
                        <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><line x1="7" x2="7" y1="8" y2="13"/><line x1="12" x2="12" y1="8" y2="16"/><line x1="17" x2="17" y1="8" y2="11"/></svg></span> Kanban & MEP
                    </button>
                </div>
            </div>

            <div class="nav-section nav-collapsed" data-section="techniques">
                <button class="nav-section-header" onclick="toggleNavSection('techniques')">
                    <span class="nav-section-chevron"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
                    <span class="nav-section-label">Outils techniques</span>
                </button>
                <div class="nav-section-body">
                    <button data-route="snippets" class="nav-item" onclick="navigateTo('snippets')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span> Snippetator</button>
                    <button data-route="sql" class="nav-item" onclick="navigateTo('sql')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg></span> SQL Generator</button>
                    <button data-route="loganalyzer" class="nav-item" onclick="navigateTo('loganalyzer')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg></span> LOG Analyzor</button>
                    <button data-route="xmlviewer" class="nav-item" onclick="navigateTo('xmlviewer')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span> Ivalua Context</button>
                    <button data-route="bible" class="nav-item" onclick="navigateTo('bible')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg></span> TMA Formator</button>
                    <button data-route="analytics" class="nav-item" onclick="navigateTo('analytics')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12c.552 0 1.005-.449.95-.998a10 10 0 0 0-8.953-8.951c-.55-.055-.997.398-.997.95v8a1 1 0 0 0 1 1h8Z"/><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/></svg></span> Analytics & Vélocité</button>
                    <button data-route="errortracker" class="nav-item" onclick="navigateTo('errortracker')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg></span> Error Tracker</button>
                    <button data-route="gitcicd" class="nav-item" onclick="navigateTo('gitcicd')"><span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="18" r="3"/><circle cx="6" cy="6" r="3"/><path d="M6 21V9a9 9 0 0 0 9 9"/></svg></span> Git & CI/CD</button>
                </div>
            </div>
        </div>

        <div class="nav-footer">
            <button data-route="config" class="nav-item" id="nav-config" onclick="navigateTo('config')">
                <span class="nav-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                <span>Configuration</span>
            </button>
        </div>

    <button class="sidebar-toggle-btn" id="toggle-menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="18" y2="18"/></svg>
    </button>

    <main class="main-content" id="content"></main>
</div>

<button class="scratchpad-btn" onclick="document.getElementById('scratchpad-panel').classList.toggle('open')" title="Bloc-notes éphémère">📝</button>
<div class="scratchpad-panel" id="scratchpad-panel">
  <div class="scratchpad-header">
    <span>📝 Bloc-notes rapide</span>
    <button onclick="document.getElementById('scratchpad-panel').classList.remove('open')" style="background:none;border:none;color:white;cursor:pointer;">×</button>
  </div>
  <textarea id="scratchpad-text" class="scratchpad-area" placeholder="Collez vos logs, IDs, requêtes temporaires ici..." oninput="localStorage.setItem('cyrias_scratchpad', this.value)"></textarea>
</div>

<script type="text/template" id="tpl-dashboard">
    <div class="hero-section">
        <div id="home-welcome-banner" style="padding: 28px 40px 12px 40px;">
            <h1 style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;color:var(--primary);margin:0;letter-spacing:-0.5px;">
                <span id="home-greeting">Bonjour</span> <span id="home-username" style="color:var(--secondary-dark);"></span>
            </h1>
            <p id="home-date" style="font-size:13px;color:var(--ink-muted);margin-top:4px;text-transform:capitalize;"></p>
        </div>

        <h3 class="section-title">Vos indicateurs</h3>
        <div class="content-grid" id="home-grid">
            <div class="card p-6" style="border-left: 4px solid var(--info); cursor: pointer;" onclick="navigateTo('kanban')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Tickets Kanban</div>
                <div class="text-2xl font-bold" id="dash-tickets">--</div>
            </div>
            <div class="card p-6" style="border-left: 4px solid var(--brand); cursor: pointer;" onclick="navigateTo('craminator')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Jours saisis ce mois</div>
                <div class="text-2xl font-bold" id="dash-cra">--</div>
            </div>
            <div class="card p-6" style="border-left: 4px solid var(--warn); cursor: pointer;" onclick="navigateTo('organisator')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Tâches du jour</div>
                <div class="text-2xl font-bold" id="dash-tasks">--</div>
            </div>
        </div>
    </div>
</script>

<script type="text/template" id="tpl-clients">
    <div class="page-header">
        <div>
            <h1>🏢 Espace Client 360</h1>
            <p>Pilotage commercial, financier et suivi hebdomadaire</p>
        </div>
    </div>
    
    <div class="tools-container grid" style="grid-template-columns: 280px 1fr; gap: 24px;">
        <div class="card" style="height: fit-content;">
            <div class="card-header"><h3>Clients</h3></div>
            <div class="card-body">
                <input type="text" id="search-client-360" oninput="ClientsModule.renderList()" placeholder="Rechercher..." class="form-input mb-4">
                <div id="client-360-list" class="flex flex-col gap-2 overflow-y-auto" style="max-height: 60vh;"></div>
            </div>
        </div>

        <div>
            <div id="client-360-placeholder" class="card empty-state">
                <div class="empty-state-icon">🏢</div>
                <div class="empty-state-text">Sélectionnez un client dans la liste pour voir sa fiche</div>
            </div>

            <div id="client-360-content" class="is-hidden">
                <div class="flex gap-2 mb-4" style="border-bottom: 1px solid var(--divider); padding-bottom: 8px;">
                    <button class="btn btn-ghost active" onclick="ClientsModule.switchSubTab('suivi')" id="tab-btn-suivi" style="border-bottom: 2px solid var(--brand); border-radius: 0;">📝 Suivi Hebdo</button>
                    <button class="btn btn-ghost" onclick="ClientsModule.switchSubTab('stats')" id="tab-btn-stats" style="border-radius: 0;">📊 Conso & Stats</button>
                </div>

                <div id="subtab-suivi">
                    <div class="grid grid-2 gap-4">
                        <div class="card">
                            <div class="card-header"><h3>✍️ Nouveau point</h3></div>
                            <div class="card-body">
                                <label class="form-label">Sujets en cours</label>
                                <textarea id="suivi-sujets" class="form-input mb-4" style="min-height: 80px;" placeholder="Actions réalisées..."></textarea>
                                
                                <label class="form-label">Points d'attention</label>
                                <textarea id="suivi-attention" class="form-input mb-4" style="min-height: 80px;" placeholder="Risques, alertes..."></textarea>
                                
                                <button class="btn btn-primary w-full" onclick="ClientsModule.addNote()">Enregistrer la note</button>
                            </div>
                        </div>
                        <div class="card">
                            <div class="card-header"><h3>📜 Historique</h3></div>
                            <div class="card-body" style="padding: 0;">
                                <div id="suivi-history-list" class="flex flex-col gap-4 overflow-y-auto" style="max-height: 500px; padding: 16px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="subtab-stats" class="is-hidden card empty-state">
                    <div class="empty-state-icon">🚧</div>
                    <div class="empty-state-text">Les données de temps et facturation arriveront ici.</div>
                </div>
            </div>
        </div>
    </div>
</script>

<script type="text/template" id="tpl-craminator">
    <div id="page-craminator" style="display:block !important; position:relative; left:0; height:auto; overflow:visible; opacity:1;">
        <div class="page-header" style="padding-bottom: 20px; background: var(--surface); border-bottom: 1px solid var(--border);">
            <div>
                <h1 style="font-family: 'Fraunces', serif; font-size: 28px; font-weight: 800; color: var(--primary);">CRAminator</h1>
                <p style="color: var(--ink-muted); font-size: 14px; margin-top: 4px;">Outil de suivi TMA & Analyse des temps (CRA)</p>
            </div>
        </div>

        <div class="container mx-auto px-4 py-4" style="max-width: 1400px; margin: 0 auto;">
            <div id="upload-section">
                <div id="source-manager" class="is-hidden mb-6 card p-5" style="background: linear-gradient(135deg, rgba(94, 176, 145, 0.05), rgba(27, 59, 92, 0.05)); border: 1px solid var(--border);">
                    <div class="flex items-center justify-between mb-4">
                        <div>
                            <h3 class="text-sm font-bold text-primary">Sources de données</h3>
                            <p class="text-xs text-muted"><span id="source-count">0</span> source(s) chargée(s) — <span id="total-records-count" class="font-mono">0</span> lignes</p>
                        </div>
                        <div class="flex gap-2">
                            <label class="btn btn-outline text-xs cursor-pointer">
                                + Ajouter
                                <input type="file" class="is-hidden" accept=".xlsx,.xls,.csv" multiple onchange="CRAModule.handleFiles(event)" style="display:none;">
                            </label>
                            <button onclick="CRAModule.clearData()" class="btn btn-danger text-xs">Tout effacer</button>
                        </div>
                    </div>
                    <div id="source-chips" class="flex flex-wrap gap-2"></div>
                </div>

                <div id="drop-zone" class="card p-12 text-center max-w-3xl mx-auto" style="border: 2px dashed var(--brand); background: var(--bg);">
                    <h2 class="text-xl font-bold mb-2 text-primary">Importez vos fichiers Stafiz bruts</h2>
                    <label class="btn btn-primary cursor-pointer mt-4">
                        Parcourir mes fichiers
                        <input type="file" class="is-hidden" accept=".xlsx,.xls,.csv" multiple onchange="CRAModule.handleFiles(event)" style="display:none;">
                    </label>
                </div>
            </div>

            <div id="dashboard-section" class="is-hidden">
                <div class="sticky py-3 mb-5" style="top: 80px; z-index: 40; background: rgba(255, 255, 255, 0.97); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);">
                    <div class="flex flex-wrap items-center gap-2">
                        <button onclick="CRAModule.switchTab('dashboard')" id="btn-tab-dashboard" class="btn btn-primary text-xs">Dashboard</button>
                        <button onclick="CRAModule.switchTab('explorer')" id="btn-tab-explorer" class="btn btn-outline text-xs">Explorateur</button>
                        <button onclick="CRAModule.openFilters()" class="btn btn-ghost text-xs font-bold" style="color: var(--brand);">Filtrer 🔍</button>
                    </div>
                </div>

                <div id="dashboard-content">
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                        <div class="card p-5"><h3 class="text-sm font-bold mb-3">Jours par Client</h3><div style="height:250px;"><canvas id="clientChart"></canvas></div></div>

    <div class="page-header">
        <h1>Module en construction</h1>
    </div>
    <div class="card p-6 text-center text-muted">
        <p>Ce module est actuellement en cours de développement ou n'a pas encore de template défini.</p>
    </div>
</script>

<script>
    function navigateTo(page) {
        if (window.Router) {
            Router.navigate(page);
        } else {
            console.error("Router n'est pas encore chargé");
        }
    }

    function toggleNavSection(name) {
        const sec = document.querySelector(`.nav-section[data-section="${name}"]`);
        if (sec) {
            sec.classList.toggle('nav-collapsed');
            const collapsed = JSON.parse(localStorage.getItem('cyrias_nav_collapsed') || '["techniques"]');
            if (sec.classList.contains('nav-collapsed')) {
                if (!collapsed.includes(name)) collapsed.push(name);
            } else {
                const idx = collapsed.indexOf(name);
                if (idx > -1) collapsed.splice(idx, 1);
            }
            localStorage.setItem('cyrias_nav_collapsed', JSON.stringify(collapsed));
        }
    }

    function openGlobalSearch() {
        alert("La recherche globale (Ctrl+K) est en cours de développement.");
    }

    window.addEventListener('DOMContentLoaded', () => {
        // Restauration de l'accordéon
        const collapsed = JSON.parse(localStorage.getItem('cyrias_nav_collapsed') || '["techniques"]');
        collapsed.forEach(name => {
            const sec = document.querySelector(`.nav-section[data-section="${name}"]`);
            if (sec) sec.classList.add('nav-collapsed');
        });
        // Restauration du Scratchpad
        const sp = document.getElementById('scratchpad-text');
        if (sp) sp.value = localStorage.getItem('cyrias_scratchpad') || '';
    });
</script>
