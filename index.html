<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyrias Buddy — Portail Modulaire</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/css/main.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/css/tom-select.default.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.2.2/dist/js/tom-select.complete.min.js"></script>
</head>
<body>

<script>
(function(){try{var s=localStorage.getItem('cyrias_app_theme');var t=s?JSON.parse(s):(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}})();
</script>

<div class="app">
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="brand">
                <div class="brand-name">CYR<span>IAS</span> Bud<span>dy</span></div>
            </div>
            <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="Réduire (Ctrl+B)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M9 3v18"/></svg>
            </button>
            <button class="theme-toggle" id="toggle-theme"><span id="theme-icon"></span></button>
        </div>

        <div class="sidebar-nav" id="sidebar-nav">
            </div>

        <div class="nav-footer">
            <button class="nav-item" id="nav-config" onclick="Router.navigate('config')">
                <span class="nav-icon">⚙️</span> Configuration
            </button>
        </div>
    </nav>

    <button class="sidebar-toggle-btn" id="toggle-menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="18" y2="18"/></svg>
    </button>

    <main class="main-content" id="content"></main>
</div>

<script src="assets/js/storage.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/router.js"></script>

<script src="modules/craminator.js"></script>
<script src="modules/clients.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
