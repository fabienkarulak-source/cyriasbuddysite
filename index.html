  <textarea id="scratchpad-text" class="scratchpad-area" placeholder="Collez vos logs, IDs, requêtes temporaires ici..." oninput="localStorage.setItem('cyrias_scratchpad', this.value)"></textarea>
</div>

<script>
    // Ces fonctions assurent la liaison entre le HTML et le Javascript
    function navigateTo(page) { 
        if (window.Router) {
            Router.navigate(page); 
        } else {
            console.error("Router n'est pas encore initialisé");
        }
    }

    // Gestion de l'accordéon des menus
    function toggleNavSection(name) {
        const sec = document.querySelector(`.nav-section[data-section="${name}"]`);
        if (sec) {
            sec.classList.toggle('nav-collapsed');
            // Mémorisation de l'état (pour ne pas que ça se referme en changeant de page)
            const collapsed = JSON.parse(localStorage.getItem('cyrias_nav_collapsed') || '["techniques"]');
            if (sec.classList.contains('nav-collapsed')) {
                if (!collapsed.includes(name)) collapsed.push(name);
            } else {
                const idx = collapsed.indexOf(name);
                if (idx > -1) collapsed.splice(idx, 1);
            }
            localStorage.setItem('cyrias_nav_collapsed', JSON.stringify(collapsed));
        }
    }

    // Restauration de l'état des menus au chargement
    window.addEventListener('DOMContentLoaded', () => {
        const collapsed = JSON.parse(localStorage.getItem('cyrias_nav_collapsed') || '["techniques"]');
        collapsed.forEach(name => {
            const sec = document.querySelector(`.nav-section[data-section="${name}"]`);
            if (sec) sec.classList.add('nav-collapsed');
        });
        
        // Restauration du contenu du scratchpad
        const sp = document.getElementById('scratchpad-text');
        if (sp) sp.value = localStorage.getItem('cyrias_scratchpad') || '';
    });

    function openGlobalSearch() { if(window.Toast) Toast.info("Recherche (Ctrl+K) bientôt disponible"); }
</script>
