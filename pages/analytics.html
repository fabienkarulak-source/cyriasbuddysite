<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-5);padding-bottom:var(--space-4);border-bottom:1px solid var(--border);">
  <div>
    <h1 style="font-size:var(--fs-2xl);font-weight:var(--fw-extrabold);font-family:'Outfit',sans-serif;letter-spacing:-0.5px;">📈 Analytics</h1>
    <p style="font-size:var(--fs-md);color:var(--ink-muted);margin-top:4px;">Métriques et tendances</p>
  </div>
  <div style="display:flex;gap:8px;"><button class="btn btn-outline btn-sm" id="ana-refresh">🔄 Actualiser</button></div>
</div>
<div class="stat-grid">
  <div class="stat">
    <div class="stat-label">Tâches créées (30j)</div>
    <div class="stat-value" id="ana-tasks-30">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Tâches terminées (30j)</div>
    <div class="stat-value" id="ana-done-30" style="color:var(--ok-fg);">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Vélocité hebdo</div>
    <div class="stat-value" id="ana-velocity">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Entrées journal (30j)</div>
    <div class="stat-value" id="ana-journal-30">0</div>
  </div>
</div>

<div class="grid grid-2">
  <div class="card">
    <h3 class="card-title mb-4">📊 Tâches par statut</h3>
    <canvas id="chart-tasks" style="max-height:300px;"></canvas>
  </div>
  <div class="card">
    <h3 class="card-title mb-4">📈 Activité 30 derniers jours</h3>
    <canvas id="chart-activity" style="max-height:300px;"></canvas>
  </div>
</div>

<div class="card mt-4">
  <h3 class="card-title mb-4">💾 Utilisation par module</h3>
  <div id="ana-storage"></div>
</div>
