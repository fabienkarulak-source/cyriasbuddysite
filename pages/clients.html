<div id="page-clients">
    <div class="page-header">
        <div>
            <h1>🏢 Espace Client 360</h1>
            <p>Pilotage commercial, financier et suivi hebdomadaire</p>
        </div>
    </div>
    
    <div class="tools-container">
        <div class="grid" style="grid-template-columns: 300px 1fr; gap: 24px;">
            <div class="card" style="height: fit-content;">
                <div class="card-header">
                    <h3>Clients</h3>
                </div>
                <div class="card-body">
                    <input type="text" id="search-client-360" oninput="ClientsModule.renderList()" placeholder="Rechercher un client..." class="input mb-4">
                    <div id="client-360-list" style="display: flex; flex-direction: column; gap: 4px; max-height: 60vh; overflow-y: auto;"></div>
                </div>
            </div>

            <div>
                <div id="client-360-placeholder" class="card empty-state">
                    <div class="empty-state-icon">🏢</div>
                    <div class="empty-state-text">Sélectionnez un client dans la liste</div>
                </div>

                <div id="client-360-content" class="is-hidden">
                    <div style="display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 1px solid var(--divider); padding-bottom: 8px;">
                        <button class="btn btn-ghost active" onclick="ClientsModule.switchSubTab('suivi')" id="tab-btn-suivi" style="border-bottom: 2px solid var(--brand); border-radius: 0;">📝 Suivi Hebdo</button>
                        <button class="btn btn-ghost" onclick="ClientsModule.switchSubTab('stats')" id="tab-btn-stats" style="border-radius: 0;">📊 Conso & Stats</button>
                    </div>

                    <div id="subtab-suivi">
                        <div class="grid grid-2 gap-4">
                            <div class="card">
                                <div class="card-header"><h3>✍️ Nouveau point</h3></div>
                                <div class="card-body">
                                    <div class="form-group">
                                        <label class="label">Sujets en cours</label>
                                        <textarea id="suivi-sujets" class="textarea" placeholder="Actions réalisées cette semaine..."></textarea>
                                    </div>
                                    <div class="form-group">
                                        <label class="label">Points d'attention</label>
                                        <textarea id="suivi-attention" class="textarea" placeholder="Risques, blocages..."></textarea>
                                    </div>
                                    <button class="btn btn-primary w-full" onclick="ClientsModule.addNote()">Enregistrer la note</button>
                                </div>
                            </div>
                            <div class="card">
                                <div class="card-header"><h3>📜 Historique</h3></div>
                                <div class="card-body" style="padding: 0;">
                                    <div id="suivi-history-list" style="display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 500px; padding: 16px;"></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div id="subtab-stats" class="is-hidden">
                        <div class="card p-6 text-center text-muted">
                            <h3>Module en construction</h3>
                            <p>Les indicateurs TJM, budgets et KPI financiers pour ce client seront affichés ici.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
