<div id="page-dashboard">
    <div class="hero-section">
        <div id="home-welcome-banner" style="padding: 28px 40px 12px 40px;">
            <h1 style="font-family:'Outfit',sans-serif;font-size:24px;font-weight:700;color:var(--primary);margin:0;letter-spacing:-0.5px;">
                <span id="home-greeting">Bonjour</span> <span id="home-username" style="color:var(--secondary-dark);"></span>
            </h1>
            <p id="home-date" style="font-size:13px;color:var(--ink-muted);margin-top:4px;text-transform:capitalize;"></p>
        </div>

        <h3 class="section-title">Vos indicateurs de pilotage</h3>
        <div class="content-grid" id="home-grid">
            <div class="card p-6" style="border-left: 4px solid var(--info); cursor: pointer;" onclick="Router.navigate('kanban')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Tickets Kanban</div>
                <div class="text-2xl font-bold" id="dash-tickets">--</div>
            </div>
            <div class="card p-6" style="border-left: 4px solid var(--brand); cursor: pointer;" onclick="Router.navigate('craminator')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Jours saisis ce mois</div>
                <div class="text-2xl font-bold" id="dash-cra">--</div>
            </div>
            <div class="card p-6" style="border-left: 4px solid var(--warn); cursor: pointer;" onclick="Router.navigate('organisator')">
                <div class="text-xs text-muted uppercase font-bold mb-2">Tâches du jour</div>
                <div class="text-2xl font-bold" id="dash-tasks">--</div>
            </div>
        </div>

        <h3 class="section-title" style="margin-top: 10px;">Vos liens rapides</h3>
        <div id="home-links-container" class="content-grid" style="padding: 0 40px;"></div>
    </div>
</div>
