<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-5);padding-bottom:var(--space-4);border-bottom:1px solid var(--border);">
  <div>
    <h1 style="font-size:var(--fs-2xl);font-weight:var(--fw-extrabold);font-family:'Outfit',sans-serif;letter-spacing:-0.5px;">🧾 Facturator</h1>
    <p style="font-size:var(--fs-md);color:var(--ink-muted);margin-top:4px;">Gestion des factures</p>
  </div>
  <div style="display:flex;gap:8px;"><button class="btn btn-primary btn-sm" id="fact-new">+ Nouvelle facture</button></div>
</div>
<div class="stat-grid">
  <div class="stat">
    <div class="stat-label">Total factures</div>
    <div class="stat-value" id="fact-total">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Montant total</div>
    <div class="stat-value" id="fact-amount">0 €</div>
  </div>
  <div class="stat">
    <div class="stat-label">En attente</div>
    <div class="stat-value" id="fact-pending" style="color:var(--warn);">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Payées</div>
    <div class="stat-value" id="fact-paid" style="color:var(--ok-fg);">0</div>
  </div>
</div>

<div class="card">
  <table class="table">
    <thead>
      <tr>
        <th>N°</th>
        <th>Date</th>
        <th>Client</th>
        <th>Description</th>
        <th>Montant HT</th>
        <th>TVA</th>
        <th>Total TTC</th>
        <th>Statut</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="fact-tbody"></tbody>
  </table>
</div>
